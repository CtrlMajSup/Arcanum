<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Scènes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
:root{--bg:#f7f6f3;--sf:#fff;--sf2:#f2f1ee;--sf3:#eae9e5;--ink:#1a1917;--ink2:#6b6861;--ink3:#b0afa9;--ln:#e4e3df;--ln2:#d0cfc9;--red:#c0392b;--r:8px;--rl:12px;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:var(--text-base);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:99px}

.topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--ln);background:var(--sf);gap:10px}
.back{display:flex;align-items:center;gap:5px;font-size:var(--text-sm);color:var(--ink3);text-decoration:none;border:1px solid var(--ln);border-radius:var(--r);padding:5px 10px;transition:all .12s}
.back:hover{color:var(--ink);border-color:var(--ink2)}.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.tb-title{font-size:var(--text-base);font-weight:500;color:var(--ink)}
.tb-r{margin-left:auto;display:flex;gap:7px;align-items:center}

.ws{display:flex;flex:1;overflow:hidden}

/* SIDEBAR CHAPITRES */
.sb{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--ln);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:12px;border-bottom:1px solid var(--ln)}
.sb-title{font-size:var(--text-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.chap-list{flex:1;overflow-y:auto;padding:7px}
.chap-item{border:1px solid var(--ln);border-radius:var(--r);margin-bottom:5px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.chap-item:hover{border-color:var(--ln2)}.chap-item.active{border-color:var(--ink)}
.chap-head{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--sf)}
.chap-num{font-family:var(--mono);font-size:var(--text-xs);color:var(--ink3);width:28px;flex-shrink:0}
.chap-info{flex:1;min-width:0}
.chap-titre{font-size:var(--text-sm);font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chap-date{font-size:var(--text-xs);color:var(--ink3)}
.chap-cnt{font-size:var(--text-xs);font-family:var(--mono);color:var(--ink3);flex-shrink:0}
.chap-scenes{padding:0 7px 7px;display:flex;flex-direction:column;gap:3px}
.scene-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background .1s;border:1px solid transparent}
.scene-row:hover{background:var(--sf2)}.scene-row.active{background:var(--sf2);border-color:var(--ln2)}
.scene-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scene-label{font-size:var(--text-xs);color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scene-loc{font-size:var(--text-xs);color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.sb-foot{padding:8px;border-top:1px solid var(--ln);display:flex;flex-direction:column;gap:5px}
.nbtn{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border-radius:var(--r);border:1px dashed var(--ln2);background:transparent;color:var(--ink2);font-family:var(--sans);font-size:var(--text-xs);cursor:pointer;transition:all .12s;width:100%}
.nbtn:hover{border-color:var(--ink);color:var(--ink);background:var(--sf2)}.nbtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.empty-sb{text-align:center;color:var(--ink3);font-size:var(--text-xs);padding:24px 12px;line-height:2}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.welc h2{font-size:16px;font-weight:300;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase}
.welc p{font-size:var(--text-sm);color:var(--ink3);text-align:center;line-height:1.9}

/* FORM TOOLBAR */
.ftb{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 22px;border-bottom:1px solid var(--ln);background:var(--sf);gap:10px}
.ftbl{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.stitle-inp{font-family:var(--sans);font-size:var(--text-base);font-weight:500;color:var(--ink);border:none;background:transparent;outline:none;flex:1;min-width:80px}
.stitle-inp::placeholder{color:var(--ink3)}
.ftbr{display:flex;gap:6px;flex-shrink:0}

/* FORM BODY */
.fbody{flex:1;overflow-y:auto;padding:22px}

/* HEADER CARD */
.scene-header-card{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;padding:16px;border:1px solid var(--ln);border-radius:var(--rl);background:var(--sf)}

/* FIELD GROUPS */
.fg{margin-bottom:20px}
.fgl{font-size:var(--text-xs);font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.fgl::after{content:'';flex:1;height:1px;background:var(--ln)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:var(--text-xs);color:var(--ink2)}
.fi input,.fi select,.fi textarea{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);padding:7px 9px;outline:none;transition:border-color .15s;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ink)}
.fi input::placeholder,.fi textarea::placeholder{color:var(--ink3)}
.fi textarea{resize:vertical;min-height:80px;line-height:1.6}
.fi select{cursor:pointer}

/* LIEU SELECTOR */
.lieu-sel-wrap{display:flex;flex-direction:column;gap:8px}
.lieu-hierarchy{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lieu-step{display:flex;align-items:center;gap:6px}
.lieu-step select{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);padding:6px 9px;outline:none;cursor:pointer;transition:border-color .15s}
.lieu-step select:focus{border-color:var(--ink)}
.lieu-arrow{font-size:var(--text-sm);color:var(--ink3)}
.lieu-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;border:1px solid var(--ln);font-size:var(--text-xs);color:var(--ink2);background:var(--sf2)}
.lieu-dot{width:9px;height:9px;border-radius:50%}

/* PERSONNAGES SELECTOR */
.perso-search-wrap{position:relative}
.perso-drop{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--sf);border:1px solid var(--ln2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:200;max-height:200px;overflow-y:auto}
.pdrop-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .1s}
.pdrop-item:hover,.pdrop-item.sel{background:var(--sf2)}
.pav{width:24px;height:24px;border-radius:50%;background:var(--sf3);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);color:var(--ink3);flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;object-fit:cover}
.pname{font-size:var(--text-sm);color:var(--ink)}.prole{font-size:var(--text-xs);color:var(--ink3);margin-left:auto}
.persos-selected{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ptag{display:flex;align-items:center;gap:5px;padding:4px 8px 4px 4px;border-radius:99px;border:1px solid var(--ln);background:var(--sf);font-size:var(--text-xs);color:var(--ink2);cursor:default}
.ptag-av{width:18px;height:18px;border-radius:50%;background:var(--sf3);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:8px;overflow:hidden;flex-shrink:0}
.ptag-av img{width:100%;height:100%;object-fit:cover}
.ptag-del{cursor:pointer;color:var(--ink3);font-size:var(--text-base);line-height:1;margin-left:2px;transition:color .1s}.ptag-del:hover{color:var(--red)}
.no-persos{font-size:var(--text-xs);color:var(--ink3);padding:8px 0}

/* CHAPITRE SELECTOR dans le modal */
.chap-modal-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;margin-bottom:14px}
.chap-modal-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--ln);border-radius:var(--r);cursor:pointer;transition:all .12s}
.chap-modal-item:hover{border-color:var(--ln2);background:var(--sf2)}
.chap-modal-item.active{border-color:var(--ink);background:var(--sf2)}
.cmi-num{font-family:var(--mono);font-size:var(--text-xs);color:var(--ink3);width:26px}
.cmi-info{flex:1}.cmi-titre{font-size:var(--text-sm);font-weight:500;color:var(--ink)}.cmi-date{font-size:var(--text-xs);color:var(--ink3)}

/* BTNS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-family:var(--sans);font-size:var(--text-sm);font-weight:500;cursor:pointer;border:1px solid;transition:all .12s}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.bto{background:transparent;border-color:var(--ln2);color:var(--ink2)}.bto:hover{border-color:var(--ink);color:var(--ink)}
.btd{background:var(--ink);border-color:var(--ink);color:var(--bg)}.btd:hover{background:#333}
.btg{background:transparent;border-color:transparent;color:var(--ink3);padding:6px 9px}.btg:hover{color:var(--ink);background:var(--sf2)}
.btdng{background:transparent;border-color:transparent;color:var(--ink3);padding:6px 9px}.btdng:hover{color:var(--red);background:rgba(192,57,43,.06)}
.btsm{padding:5px 9px;font-size:var(--text-xs)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,25,23,.4);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--sf);border-radius:var(--rl);padding:22px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:var(--text-base);font-weight:500;margin-bottom:12px}
.modal-acts{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}
.modal-fi{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.modal-fi label{font-size:var(--text-xs);color:var(--ink2)}
.modal-fi input,.modal-fi select{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf2);border:1px solid var(--ln);border-radius:var(--r);padding:7px 9px;outline:none;width:100%}
.modal-fi input:focus{border-color:var(--ink)}

.toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:var(--bg);font-size:var(--text-sm);padding:9px 14px;border-radius:var(--r);z-index:999;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.confirm-modal p{font-size:var(--text-sm);color:var(--ink2);line-height:1.7;margin-bottom:16px}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil</a>
  <span class="tb-title">Scènes</span>
  <div class="tb-r">
    <button class="btn bto btsm" onclick="showChapModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau chapitre
    </button>
  </div>
</div>

<div class="ws">

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-title">Chapitres & scènes</div>
    </div>
    <div class="chap-list" id="chapList"></div>
    <div class="sb-foot">
      <button class="nbtn" onclick="showChapModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau chapitre
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainPanel">
    <div class="welc">
      <h2>Scènes</h2>
      <p>Sélectionnez un chapitre pour voir ses scènes,<br>ou créez votre premier chapitre.</p>
    </div>
  </main>

</div>

<script src="arcanum.js"></script>
<script>
let currentChapId = null;
let currentSceneId = null;
let persoDropIdx = -1;

// ═══════════════════════════════════════════════
// SIDEBAR CHAPITRES
// ═══════════════════════════════════════════════
function renderSidebar() {
  const chaps = ARCANUM.Chapitres.list();
  const el = document.getElementById('chapList');
  if (!chaps.length) {
    el.innerHTML = '<div class="empty-sb">Aucun chapitre.<br>Créez-en un pour commencer.</div>';
    return;
  }
  el.innerHTML = chaps.map(ch => {
    const scenes = ARCANUM.Scenes.byChap(ch.id);
    const isChapActive = ch.id === currentChapId;
    const scenesHtml = isChapActive ? scenes.map(s => {
      const lieu = ARCANUM.Lieux.get(s.lieuId);
      const col  = lieu ? (lieu.couleur || '#b0afa9') : '#d0cfc9';
      return `<div class="scene-row${s.id===currentSceneId?' active':''}" onclick="selectScene('${s.id}')">
        <div class="scene-dot" style="background:${col}"></div>
        <span class="scene-label">${esc(s.titre||'Scène sans titre')}</span>
        <span class="scene-loc">${esc(lieu?.nom||'—')}</span>
      </div>`;
    }).join('') + `<button class="nbtn" style="margin-top:4px" onclick="newScene('${ch.id}')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter une scène
    </button>` : '';

    return `<div class="chap-item${isChapActive?' active':''}">
      <div class="chap-head" onclick="toggleChap('${ch.id}')">
        <span class="chap-num">Ch.${ch.numero}</span>
        <div class="chap-info">
          <div class="chap-titre">${esc(ch.titre||'Sans titre')}</div>
          ${ch.dateFiction?`<div class="chap-date">${esc(ch.dateFiction)}</div>`:''}
        </div>
        <span class="chap-cnt">${scenes.length}</span>
      </div>
      ${isChapActive?`<div class="chap-scenes">${scenesHtml}</div>`:''}
    </div>`;
  }).join('');
}

function toggleChap(id) {
  currentChapId = currentChapId === id ? null : id;
  if (currentChapId !== id) currentSceneId = null;
  renderSidebar();
  if (!currentChapId) showWelcome();
}

// ═══════════════════════════════════════════════
// SCENE SELECT / NEW
// ═══════════════════════════════════════════════
function selectScene(id) {
  currentSceneId = id;
  renderSidebar();
  renderSceneForm();
}

function newScene(chapId) {
  const s = ARCANUM.Scenes.defaultNew(chapId);
  ARCANUM.Scenes.save(s);
  currentChapId = chapId;
  currentSceneId = s.id;
  renderSidebar();
  renderSceneForm();
}

function deleteScene(id) {
  confirmModal('Supprimer cette scène ?', () => {
    ARCANUM.Scenes.delete(id);
    currentSceneId = null;
    renderSidebar();
    showWelcome();
  });
}

function showWelcome() {
  document.getElementById('mainPanel').innerHTML = `<div class="welc"><h2>Scènes</h2><p>Sélectionnez une scène ou créez-en une.</p></div>`;
}

// ═══════════════════════════════════════════════
// SCENE FORM
// ═══════════════════════════════════════════════
function renderSceneForm() {
  const s = ARCANUM.Scenes.get(currentSceneId);
  if (!s) return;
  const chap = ARCANUM.Chapitres.get(s.chapitreId);

  // Build lieu selector HTML
  const lieuHtml = buildLieuSelector(s.lieuId);

  // Build perso selected tags
  const persoTagsHtml = buildPersoTags(s.personnageIds || []);

  // Chapitre badge
  const chapLabel = chap ? `Ch.${chap.numero} — ${chap.titre||'Sans titre'}` : '—';

  document.getElementById('mainPanel').innerHTML = `
  <div class="ftb">
    <div class="ftbl">
      <input class="stitle-inp" id="stitleInp" value="${esc(s.titre||'')}" placeholder="Titre de la scène"
        oninput="updateScene('titre',this.value)">
      <span style="font-size:var(--text-xs);color:var(--ink3);white-space:nowrap">${esc(chapLabel)}</span>
    </div>
    <div class="ftbr">
      <button class="btn btdng btsm" onclick="deleteScene('${s.id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
      <button class="btn btd btsm" onclick="saveScene()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Sauvegarder
      </button>
    </div>
  </div>

  <div class="fbody">

    <div class="scene-header-card">
      <div class="fi"><label>Chapitre</label>
        <select id="f-chap" onchange="updateScene('chapitreId',this.value);renderSidebar()">
          ${ARCANUM.Chapitres.list().map(c =>
            `<option value="${c.id}" ${s.chapitreId===c.id?'selected':''}>Ch.${c.numero} — ${esc(c.titre||'Sans titre')}</option>`
          ).join('')}
        </select>
      </div>
      <div class="fi"><label>Date fictive</label>
        <input type="text" id="f-date" value="${esc(s.dateFiction||'')}" placeholder="Jour 42, An 3…"
          oninput="updateScene('dateFiction',this.value)">
      </div>
      <div class="fi"><label>Heure fictive</label>
        <input type="text" id="f-heure" value="${esc(s.heureFiction||'')}" placeholder="Aube, 14h…"
          oninput="updateScene('heureFiction',this.value)">
      </div>
    </div>

    <div class="fg"><div class="fgl">Lieu</div>
      <div class="lieu-sel-wrap" id="lieuSelWrap">${lieuHtml}</div>
    </div>

    <div class="fg"><div class="fgl">Personnages présents</div>
      <div class="perso-search-wrap">
        <input class="fi" style="border:1px solid var(--ln);border-radius:var(--r);padding:7px 9px;font-size:var(--text-sm);width:100%;outline:none;background:var(--sf);font-family:var(--sans)"
          id="persoSearchInp" placeholder="Rechercher un personnage…"
          autocomplete="off"
          oninput="showPersoDrop(this)" onfocus="showPersoDrop(this)"
          onkeydown="persoDropKey(event)">
      </div>
      <div class="persos-selected" id="persoTags">${persoTagsHtml}</div>
    </div>

    <div class="fg"><div class="fgl">Résumé & notes</div>
      <div class="fi">
        <textarea id="f-note" placeholder="Ce qui se passe dans cette scène…"
          oninput="updateScene('note',this.value)">${esc(s.note||'')}</textarea>
      </div>
    </div>

    <div class="fg"><div class="fgl">Ordre dans le chapitre</div>
      <div class="fi" style="max-width:120px">
        <input type="number" id="f-ordre" value="${s.ordre||1}" min="1"
          oninput="updateScene('ordre',+this.value)">
      </div>
    </div>

  </div>`;

  // Close perso drop on outside click
  document.addEventListener('click', closePersoDropOut);
}

// ═══════════════════════════════════════════════
// LIEU SELECTOR
// ═══════════════════════════════════════════════
function buildLieuSelector(selectedLieuId) {
  const all = ARCANUM.Lieux.all();
  const planetes = Object.values(all).filter(l => l.type === 'planete');
  const vaisseaux = Object.values(all).filter(l => l.type === 'vaisseau');

  // Determine current selection type
  const sel = all[selectedLieuId];
  const selType = sel?.type || '';

  // Type selector
  const typeOpts = `
    <option value="">— Type —</option>
    <option value="planete" ${selType==='planete'?'selected':''}>Planète</option>
    <option value="ville"   ${selType==='ville'  ?'selected':''}>Ville</option>
    <option value="vaisseau"${selType==='vaisseau'?'selected':''}>Vaisseau</option>`;

  let secondSel = '';
  let thirdSel  = '';

  if (selType === 'planete' || selType === 'ville') {
    const planOpts = planetes.map(p =>
      `<option value="${p.id}" ${(selType==='planete'&&selectedLieuId===p.id)||(selType==='ville'&&sel?.parentId===p.id)?'selected':''}>${esc(p.nom||'Sans nom')}</option>`
    ).join('');
    secondSel = `<span class="lieu-arrow">›</span>
      <div class="lieu-step">
        <select id="lsPlanet" onchange="onLieuPlanetChange(this.value)">
          <option value="">— Planète —</option>${planOpts}
        </select>
      </div>`;

    if (selType === 'ville') {
      const parentId = sel?.parentId;
      const villes = parentId ? Object.values(all).filter(l => l.type==='ville' && l.parentId===parentId) : [];
      const villeOpts = villes.map(v =>
        `<option value="${v.id}" ${selectedLieuId===v.id?'selected':''}>${esc(v.nom||'Sans nom')}</option>`
      ).join('');
      thirdSel = `<span class="lieu-arrow">›</span>
        <div class="lieu-step">
          <select id="lsVille" onchange="onLieuFinalChange(this.value)">
            <option value="">— Ville —</option>${villeOpts}
          </select>
        </div>`;
    }
  } else if (selType === 'vaisseau') {
    const vasOpts = vaisseaux.map(v =>
      `<option value="${v.id}" ${selectedLieuId===v.id?'selected':''}>${esc(v.nom||'Sans nom')}</option>`
    ).join('');
    secondSel = `<span class="lieu-arrow">›</span>
      <div class="lieu-step">
        <select id="lsVaisseau" onchange="onLieuFinalChange(this.value)">
          <option value="">— Vaisseau —</option>${vasOpts}
        </select>
      </div>`;
  }

  // Current badge
  const lieuBadge = selectedLieuId
    ? `<div class="lieu-badge"><div class="lieu-dot" style="background:${all[selectedLieuId]?.couleur||'#b0afa9'}"></div>${esc(ARCANUM.Lieux.fullName(selectedLieuId))}</div>`
    : '';

  return `<div class="lieu-hierarchy">
    <div class="lieu-step">
      <select id="lsType" onchange="onLieuTypeChange(this.value)">
        ${typeOpts}
      </select>
    </div>
    ${secondSel}${thirdSel}
  </div>
  ${lieuBadge}`;
}

function onLieuTypeChange(type) {
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  s.lieuId = null;
  ARCANUM.Scenes.save(s);
  // rebuild selector
  const wrap = document.getElementById('lieuSelWrap'); if (!wrap) return;
  const all = ARCANUM.Lieux.all();
  const planetes = Object.values(all).filter(l => l.type==='planete');
  const vaisseaux = Object.values(all).filter(l => l.type==='vaisseau');
  let secondSel = '';
  if (type === 'planete' || type === 'ville') {
    const planOpts = planetes.map(p => `<option value="${p.id}">${esc(p.nom||'Sans nom')}</option>`).join('');
    secondSel = `<span class="lieu-arrow">›</span><div class="lieu-step"><select id="lsPlanet" onchange="onLieuPlanetChange(this.value)"><option value="">— Planète —</option>${planOpts}</select></div>`;
  } else if (type === 'vaisseau') {
    const vasOpts = vaisseaux.map(v => `<option value="${v.id}">${esc(v.nom||'Sans nom')}</option>`).join('');
    secondSel = `<span class="lieu-arrow">›</span><div class="lieu-step"><select id="lsVaisseau" onchange="onLieuFinalChange(this.value)"><option value="">— Vaisseau —</option>${vasOpts}</select></div>`;
  }
  wrap.innerHTML = `<div class="lieu-hierarchy"><div class="lieu-step"><select id="lsType" onchange="onLieuTypeChange(this.value)">
    <option value="">— Type —</option>
    <option value="planete" ${type==='planete'?'selected':''}>Planète</option>
    <option value="ville"   ${type==='ville'  ?'selected':''}>Ville</option>
    <option value="vaisseau"${type==='vaisseau'?'selected':''}>Vaisseau</option>
  </select></div>${secondSel}</div>`;
  if (type === 'planete') {
    // selecting a planet as the location
  }
}

function onLieuPlanetChange(planetId) {
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  const type = document.getElementById('lsType')?.value;
  if (type === 'planete') {
    onLieuFinalChange(planetId);
    return;
  }
  // type === 'ville' — show ville sub-selector
  const all = ARCANUM.Lieux.all();
  const villes = Object.values(all).filter(l => l.type==='ville' && l.parentId===planetId);
  const villeOpts = villes.map(v => `<option value="${v.id}">${esc(v.nom||'Sans nom')}</option>`).join('');
  // remove existing third step
  const old = document.getElementById('lsVille');
  if (old) old.closest('.lieu-step').previousElementSibling?.remove(), old.closest('.lieu-step').remove();
  const hierarchy = document.querySelector('.lieu-hierarchy');
  const frag = document.createElement('div');
  frag.innerHTML = `<span class="lieu-arrow">›</span><div class="lieu-step"><select id="lsVille" onchange="onLieuFinalChange(this.value)"><option value="">— Ville —</option>${villeOpts}</select></div>`;
  while (frag.firstChild) hierarchy.appendChild(frag.firstChild);
  s.lieuId = null; ARCANUM.Scenes.save(s);
  updateLieuBadge(null);
}

function onLieuFinalChange(lieuId) {
  updateScene('lieuId', lieuId || null);
  updateLieuBadge(lieuId);
  renderSidebar();
}

function updateLieuBadge(lieuId) {
  const wrap = document.getElementById('lieuSelWrap'); if (!wrap) return;
  const old = wrap.querySelector('.lieu-badge');
  if (old) old.remove();
  if (lieuId) {
    const all = ARCANUM.Lieux.all();
    const badge = document.createElement('div');
    badge.className = 'lieu-badge';
    badge.innerHTML = `<div class="lieu-dot" style="background:${all[lieuId]?.couleur||'#b0afa9'}"></div>${esc(ARCANUM.Lieux.fullName(lieuId))}`;
    wrap.appendChild(badge);
  }
}

// ═══════════════════════════════════════════════
// PERSO SELECTOR
// ═══════════════════════════════════════════════
function buildPersoTags(ids) {
  if (!ids.length) return `<span class="no-persos">Aucun personnage — cherchez ci-dessus.</span>`;
  return ids.map(id => {
    const c = ARCANUM.Chars.get(id);
    const av = c?.image ? `<div class="ptag-av"><img src="${c.image}" alt=""></div>` : `<div class="ptag-av">${ARCANUM.Chars.initials(id)}</div>`;
    return `<div class="ptag">${av}<span>${esc(ARCANUM.Chars.name(id))}</span><span class="ptag-del" onclick="removePerso('${id}')">×</span></div>`;
  }).join('');
}

function showPersoDrop(inp) {
  const q = inp.value.toLowerCase().trim();
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  const already = new Set(s.personnageIds || []);
  const chars = ARCANUM.Chars.list()
    .filter(c => !already.has(c.id) && (!q || ARCANUM.Chars.name(c.id).toLowerCase().includes(q) || (c.role||'').toLowerCase().includes(q)))
    .slice(0, 8);
  closePersoDropEl();
  if (!chars.length) return;
  const drop = document.createElement('div');
  drop.className = 'perso-drop'; drop.id = 'persoDrop';
  drop.innerHTML = chars.map((c, i) => {
    const av = c.image ? `<div class="pav"><img src="${c.image}" alt=""></div>` : `<div class="pav">${ARCANUM.Chars.initials(c.id)}</div>`;
    return `<div class="pdrop-item" data-i="${i}" data-cid="${c.id}" onclick="addPerso('${c.id}')">
      ${av}<span class="pname">${esc(ARCANUM.Chars.name(c.id))}</span><span class="prole">${esc(c.role||'')}</span>
    </div>`;
  }).join('');
  persoDropIdx = -1;
  inp.closest('.perso-search-wrap').appendChild(drop);
}

function closePersoDropEl() { document.getElementById('persoDrop')?.remove(); }
function closePersoDropOut(e) {
  if (!e.target.closest('.perso-search-wrap')) { closePersoDropEl(); document.removeEventListener('click', closePersoDropOut); }
}
function persoDropKey(e) {
  const drop = document.getElementById('persoDrop'); if (!drop) return;
  const items = drop.querySelectorAll('.pdrop-item');
  if (e.key==='ArrowDown'){e.preventDefault();persoDropIdx=Math.min(persoDropIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===persoDropIdx));}
  else if (e.key==='ArrowUp'){e.preventDefault();persoDropIdx=Math.max(persoDropIdx-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===persoDropIdx));}
  else if (e.key==='Enter'&&persoDropIdx>=0){e.preventDefault();const sel=items[persoDropIdx];if(sel)addPerso(sel.dataset.cid);}
  else if (e.key==='Escape') closePersoDropEl();
}

function addPerso(charId) {
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  s.personnageIds = [...new Set([...(s.personnageIds||[]), charId])];
  ARCANUM.Scenes.save(s);
  closePersoDropEl();
  const inp = document.getElementById('persoSearchInp'); if (inp) inp.value = '';
  const tags = document.getElementById('persoTags'); if (tags) tags.innerHTML = buildPersoTags(s.personnageIds);
  renderSidebar();
}

function removePerso(charId) {
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  s.personnageIds = (s.personnageIds||[]).filter(id => id !== charId);
  ARCANUM.Scenes.save(s);
  const tags = document.getElementById('persoTags'); if (tags) tags.innerHTML = buildPersoTags(s.personnageIds);
  renderSidebar();
}

// ═══════════════════════════════════════════════
// SCENE UPDATE / SAVE
// ═══════════════════════════════════════════════
function updateScene(field, val) {
  const s = ARCANUM.Scenes.get(currentSceneId); if (!s) return;
  s[field] = val;
  ARCANUM.Scenes.save(s);
}

function saveScene() {
  if (!currentSceneId) return;
  toast('Scène sauvegardée ✓');
  renderSidebar();
}

// ═══════════════════════════════════════════════
// CHAPITRE MODAL
// ═══════════════════════════════════════════════
function showChapModal(editId) {
  const chap = editId ? ARCANUM.Chapitres.get(editId) : ARCANUM.Chapitres.defaultNew();
  const m = document.createElement('div'); m.className = 'modal-bg';
  m.innerHTML = `<div class="modal">
    <h3>${editId ? 'Modifier le chapitre' : 'Nouveau chapitre'}</h3>
    <div class="modal-fi"><label>Numéro</label><input type="number" id="mNum" value="${chap.numero}" min="1"></div>
    <div class="modal-fi"><label>Titre</label><input type="text" id="mTitre" value="${esc(chap.titre||'')}" placeholder="Titre du chapitre…"></div>
    <div class="modal-fi"><label>Acte / Arc</label><input type="text" id="mActe" value="${esc(chap.acte||'')}" placeholder="Acte I, Arc des origines…"></div>
    <div class="modal-fi"><label>Date fictive de début</label><input type="text" id="mDate" value="${esc(chap.dateFiction||'')}" placeholder="Jour 1, An 2247…"></div>
    <div class="modal-fi"><label>Description</label>
      <textarea id="mDesc" style="width:100%;font-family:var(--sans);font-size:var(--text-sm);border:1px solid var(--ln);border-radius:var(--r);padding:7px 9px;outline:none;min-height:60px;resize:vertical;background:var(--sf2)"
        placeholder="Résumé du chapitre…">${esc(chap.description||'')}</textarea>
    </div>
    <div class="modal-acts">
      ${editId?`<button class="btn bto btsm" style="color:var(--red);border-color:var(--red)" onclick="deleteChap('${editId}',this)">Supprimer</button>`:''}
      <button class="btn bto btsm" onclick="this.closest('.modal-bg').remove()">Annuler</button>
      <button class="btn btd btsm" onclick="saveChapModal('${chap.id}',this)">Enregistrer</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

function saveChapModal(id, btn) {
  const m = btn.closest('.modal-bg');
  const chap = ARCANUM.Chapitres.get(id) || ARCANUM.Chapitres.defaultNew();
  chap.id = id;
  chap.numero = +document.getElementById('mNum').value || chap.numero;
  chap.titre = document.getElementById('mTitre').value;
  chap.acte = document.getElementById('mActe').value;
  chap.dateFiction = document.getElementById('mDate').value;
  chap.description = document.getElementById('mDesc').value;
  ARCANUM.Chapitres.save(chap);
  m.remove();
  renderSidebar();
  toast('Chapitre enregistré ✓');
}

function deleteChap(id, btn) {
  btn.closest('.modal-bg').remove();
  confirmModal('Supprimer ce chapitre ?', () => {
    ARCANUM.Chapitres.delete(id);
    if (currentChapId === id) { currentChapId = null; currentSceneId = null; }
    renderSidebar();
    showWelcome();
  });
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function toast(msg) { const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000); }
function confirmModal(msg, onOk) {
  const m = document.createElement('div'); m.className = 'modal-bg';
  m.innerHTML = `<div class="modal confirm-modal"><h3>Confirmation</h3><p>${msg}</p><div class="modal-acts">
    <button class="btn bto btsm" onclick="this.closest('.modal-bg').remove()">Annuler</button>
    <button class="btn btd btsm" id="mOk">Confirmer</button>
  </div></div>`;
  document.body.appendChild(m);
  m.querySelector('#mOk').onclick = () => { m.remove(); onOk(); };
}

// INIT
renderSidebar();
// Auto-open first chap if exists
const firstChap = ARCANUM.Chapitres.list()[0];
if (firstChap) { currentChapId = firstChap.id; renderSidebar(); }
</script>
