<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Lieux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
:root {
  --bg:#f7f6f3;--sf:#fff;--sf2:#f2f1ee;--sf3:#eae9e5;
  --ink:#1a1917;--ink2:#6b6861;--ink3:#b0afa9;
  --ln:#e4e3df;--ln2:#d0cfc9;
  --red:#c0392b;--grn:#27624a;
  --r:8px;--rl:12px;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:var(--text-base);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:99px}

/* TOP */
.topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--ln);background:var(--sf);gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:var(--text-sm);color:var(--ink3);text-decoration:none;border:1px solid var(--ln);border-radius:var(--r);padding:5px 10px;transition:all .12s}
.back-btn:hover{color:var(--ink);border-color:var(--ink2)}
.back-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-title{font-size:var(--text-base);font-weight:500;color:var(--ink);letter-spacing:.04em}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:8px}

/* WORKSPACE */
.ws{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--ln);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:12px;border-bottom:1px solid var(--ln);display:flex;flex-direction:column;gap:8px}
.sb-filters{display:flex;gap:5px}
.chip{padding:4px 10px;border-radius:99px;border:1px solid var(--ln);font-size:var(--text-xs);cursor:pointer;background:transparent;color:var(--ink2);font-family:var(--sans);transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--ink2)}.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.sw{position:relative}.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--ink3);fill:none;stroke-width:1.8;pointer-events:none}
.sinp{width:100%;padding:7px 9px 7px 30px;border:1px solid var(--ln);border-radius:var(--r);font-family:var(--sans);font-size:var(--text-sm);background:var(--sf2);color:var(--ink);outline:none;transition:border-color .15s}
.sinp:focus{border-color:var(--ink);background:var(--sf)}.sinp::placeholder{color:var(--ink3)}
.tree-area{flex:1;overflow-y:auto;padding:8px}
.new-section{padding:8px;border-top:1px solid var(--ln);display:flex;gap:6px}
.nbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border-radius:var(--r);border:1px dashed var(--ln2);background:transparent;color:var(--ink2);font-family:var(--sans);font-size:var(--text-xs);cursor:pointer;transition:all .12s}
.nbtn:hover{border-color:var(--ink);color:var(--ink);background:var(--sf2)}.nbtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* TREE */
.tree-group{margin-bottom:14px}
.tree-group-label{font-size:var(--text-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:0 6px 6px;display:flex;align-items:center;gap:6px}
.tree-group-label::after{content:'';flex:1;height:1px;background:var(--ln)}
.tree-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .12s;margin-bottom:2px;position:relative}
.tree-item:hover{background:var(--sf2)}.tree-item.active{background:var(--sf2);border-color:var(--ln2)}
.tree-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
.tree-name{font-size:var(--text-sm);font-weight:500;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-sub{font-size:var(--text-xs);color:var(--ink3)}
.tree-child{padding-left:18px}
.tree-child .tree-item{padding:5px 8px}
.tree-child .tree-name{font-size:var(--text-sm);font-weight:400}
.vaisseau-pos{font-size:var(--text-xs);color:var(--ink3);font-style:italic}
.empty-tree{text-align:center;color:var(--ink3);font-size:var(--text-sm);padding:32px 16px;line-height:2}

/* MAIN PANEL */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.welcome-lieu{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.welcome-lieu h2{font-size:16px;font-weight:300;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase}
.welcome-lieu p{font-size:var(--text-sm);color:var(--ink3);text-align:center}

/* FORM */
.form-tb{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--ln);background:var(--sf);gap:10px}
.form-tb-l{display:flex;align-items:center;gap:8px;flex:1;overflow:hidden}
.lieu-title-inp{font-family:var(--sans);font-size:var(--text-base);font-weight:500;color:var(--ink);border:none;background:transparent;outline:none;min-width:80px}
.lieu-title-inp::placeholder{color:var(--ink3)}
.type-badge{font-size:var(--text-xs);padding:2px 8px;border-radius:99px;border:1px solid var(--ln);white-space:nowrap;flex-shrink:0}
.form-tb-r{display:flex;gap:6px;flex-shrink:0}
.form-body{flex:1;overflow-y:auto;padding:24px}

/* SECTIONS */
.sec{margin-bottom:22px}
.sec-lbl{font-size:var(--text-xs);font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--ln)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:var(--text-xs);color:var(--ink2)}
.fi input,.fi select,.fi textarea{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);padding:7px 9px;outline:none;transition:border-color .15s;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ink)}
.fi input::placeholder,.fi textarea::placeholder{color:var(--ink3)}
.fi textarea{resize:vertical;min-height:72px;line-height:1.6}
.fi select{cursor:pointer}

/* COLOR PICKER */
.color-row{display:flex;align-items:center;gap:10px}
.color-swatch{width:32px;height:32px;border-radius:6px;border:1px solid var(--ln);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.color-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100%+8px);height:calc(100%+8px)}
.color-presets{display:flex;gap:5px;flex-wrap:wrap}
.cp{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cp:hover{transform:scale(1.15)}.cp.active{border-color:var(--ink)}

/* IMAGE UPLOAD */
.img-upload{width:100%;height:120px;border:2px dashed var(--ln2);border-radius:var(--rl);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;transition:border-color .15s;background:var(--sf2)}
.img-upload:hover{border-color:var(--ink2)}
.img-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-upload svg{width:20px;height:20px;stroke:var(--ink3);fill:none;stroke-width:1.5;z-index:1}
.img-upload span{font-size:var(--text-xs);color:var(--ink3);z-index:1}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--sf3);border:1px solid var(--ln);font-size:var(--text-xs);color:var(--ink2)}
.tag-del{cursor:pointer;color:var(--ink3);line-height:1;font-size:var(--text-base);transition:color .12s}.tag-del:hover{color:var(--red)}
.tag-inp{border:1px dashed var(--ln2);background:transparent;padding:3px 8px;border-radius:99px;font-size:var(--text-xs);font-family:var(--sans);color:var(--ink);outline:none;width:100px}
.tag-inp::placeholder{color:var(--ink3)}
.tag-inp:focus{border-color:var(--ink2)}

/* PERSOS PRÉSENTS */
.persos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:8px}
.perso-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--ln);border-radius:var(--r);font-size:var(--text-sm);color:var(--ink2);cursor:default;background:var(--sf)}
.perso-av{width:22px;height:22px;border-radius:50%;background:var(--sf3);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink3);overflow:hidden;flex-shrink:0}
.perso-av img{width:100%;height:100%;object-fit:cover}

/* SCENES RÉCENTES */
.scenes-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.scene-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--ln);border-radius:var(--r);font-size:var(--text-sm);cursor:pointer;transition:background .12s;text-decoration:none;color:inherit}
.scene-item:hover{background:var(--sf2)}
.scene-chap{font-family:var(--mono);font-size:var(--text-xs);color:var(--ink3);width:50px;flex-shrink:0}
.scene-titre{flex:1;color:var(--ink)}
.scene-persos{font-size:var(--text-xs);color:var(--ink3)}

/* BTNS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-family:var(--sans);font-size:var(--text-sm);font-weight:500;cursor:pointer;border:1px solid;transition:all .12s}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.bto{background:transparent;border-color:var(--ln2);color:var(--ink2)}.bto:hover{border-color:var(--ink);color:var(--ink)}
.btd{background:var(--ink);border-color:var(--ink);color:var(--bg)}.btd:hover{background:#333}
.btg{background:transparent;border-color:transparent;color:var(--ink3);padding:6px 9px}.btg:hover{color:var(--ink);background:var(--sf2)}
.btdng{background:transparent;border-color:transparent;color:var(--ink3);padding:6px 9px}.btdng:hover{color:var(--red);background:rgba(192,57,43,.06)}
.btsm{padding:5px 9px;font-size:var(--text-xs)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,25,23,.4);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--sf);border-radius:var(--rl);padding:22px;max-width:360px;width:90%}
.modal h3{font-size:var(--text-base);font-weight:500;margin-bottom:7px}.modal p{font-size:var(--text-sm);color:var(--ink2);line-height:1.7;margin-bottom:18px}
.modal-acts{display:flex;justify-content:flex-end;gap:7px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:var(--bg);font-size:var(--text-sm);padding:9px 14px;border-radius:var(--r);z-index:999;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* TYPE COLORS */
.type-planete{background:rgba(91,141,184,.12);color:#2c5f8a;border-color:rgba(91,141,184,.3)}
.type-ville{background:rgba(123,175,123,.12);color:#2e6b2e;border-color:rgba(123,175,123,.3)}
.type-vaisseau{background:rgba(155,123,181,.12);color:#5a2e8a;border-color:rgba(155,123,181,.3)}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil
  </a>
  <span class="topbar-title">Lieux</span>
  <div class="topbar-r">
    <button class="btn bto btsm" onclick="exportLieux()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exporter
    </button>
  </div>
</div>

<div class="ws">
  <!-- SIDEBAR ARBRE -->
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-filters" id="filters">
        <button class="chip active" onclick="setFilter('all',this)">Tous</button>
        <button class="chip" onclick="setFilter('planete',this)">Planètes</button>
        <button class="chip" onclick="setFilter('vaisseau',this)">Vaisseaux</button>
      </div>
      <div class="sw">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="sinp" id="searchInp" placeholder="Rechercher…" oninput="renderTree()">
      </div>
    </div>

    <div class="tree-area" id="treeArea"></div>

    <div class="new-section">
      <button class="nbtn" onclick="newLieu('planete')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Planète
      </button>
      <button class="nbtn" onclick="newLieu('vaisseau')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Vaisseau
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainPanel">
    <div class="welcome-lieu">
      <h2>Lieux</h2>
      <p>Sélectionnez un lieu ou créez<br>une planète / ville / vaisseau.</p>
    </div>
  </main>
</div>

<script src="arcanum.js"></script>
<script>

const PRESETS = ['#5B8DB8','#7BAF7B','#C17D6F','#9B7BB5','#C4A35A','#6AABAA','#B5727C','#D4925A','#4A90A4','#8C6E9E'];
let currentId = null;
let activeFilter = 'all';

// ── TREE ──────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTree();
}

function renderTree() {
  const q = document.getElementById('searchInp').value.toLowerCase().trim();
  const data = ARCANUM.Lieux.all();
  const area = document.getElementById('treeArea');

  const planetes = Object.values(data).filter(l => l.type === 'planete');
  const vaisseaux = Object.values(data).filter(l => l.type === 'vaisseau');

  let html = '';

  const matchQ = (l) => !q || l.nom.toLowerCase().includes(q) || (l.description||'').toLowerCase().includes(q);

  // ── Planètes + villes ──
  if (activeFilter === 'all' || activeFilter === 'planete') {
    const planFiltered = planetes.filter(p => {
      if (matchQ(p)) return true;
      const enfants = ARCANUM.Lieux.enfants(p.id);
      return enfants.some(matchQ);
    });
    if (planFiltered.length) {
      html += `<div class="tree-group"><div class="tree-group-label">Planètes</div>`;
      planFiltered.forEach(p => {
        const active = p.id === currentId ? ' active' : '';
        const dot = `<div class="tree-dot" style="background:${p.couleur||'#b0afa9'}"></div>`;
        html += `<div class="tree-item${active}" onclick="selectLieu('${p.id}')">${dot}<span class="tree-name">${esc(p.nom||'Sans nom')}</span></div>`;
        // villes enfants
        const villes = ARCANUM.Lieux.enfants(p.id).filter(matchQ);
        villes.forEach(v => {
          const va = v.id === currentId ? ' active' : '';
          html += `<div class="tree-child"><div class="tree-item${va}" onclick="selectLieu('${v.id}')">
            <div class="tree-dot" style="background:${v.couleur||'#b0afa9'}"></div>
            <span class="tree-name">${esc(v.nom||'Sans nom')}</span>
            <span class="tree-sub">${esc(p.nom)}</span>
          </div></div>`;
        });
        // bouton ajouter ville
        if (!q && (activeFilter==='all'||activeFilter==='planete')) {
          html += `<div class="tree-child"><button class="nbtn" style="padding:4px 8px;font-size:var(--text-xs);margin:2px 0" onclick="newVille('${p.id}')">
            <svg viewBox="0 0 24 24" style="width:10px;height:10px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ville
          </button></div>`;
        }
      });
      html += `</div>`;
    }
  }

  // ── Vaisseaux ──
  if (activeFilter === 'all' || activeFilter === 'vaisseau') {
    const vasFiltered = vaisseaux.filter(matchQ);
    if (vasFiltered.length) {
      html += `<div class="tree-group"><div class="tree-group-label">Vaisseaux</div>`;
      vasFiltered.forEach(v => {
        const active = v.id === currentId ? ' active' : '';
        html += `<div class="tree-item${active}" onclick="selectLieu('${v.id}')">
          <div class="tree-dot" style="background:${v.couleur||'#b0afa9'}"></div>
          <span class="tree-name">${esc(v.nom||'Sans nom')}</span>
          <span class="vaisseau-pos">vaisseau</span>
        </div>`;
      });
      html += `</div>`;
    }
  }

  if (!html) html = `<div class="empty-tree">Aucun lieu.<br>Créez une planète ou un vaisseau.</div>`;
  area.innerHTML = html;
}

// ── SELECT / NEW ──────────────────────────────────────────────
function selectLieu(id) {
  currentId = id;
  renderTree();
  renderForm();
}

function newLieu(type) {
  const lieu = ARCANUM.Lieux.defaultNew(type);
  ARCANUM.Lieux.save(lieu);
  currentId = lieu.id;
  renderTree();
  renderForm();
}

function newVille(parentId) {
  const lieu = ARCANUM.Lieux.defaultNew('ville');
  lieu.parentId = parentId;
  ARCANUM.Lieux.save(lieu);
  currentId = lieu.id;
  renderTree();
  renderForm();
}

function deleteLieu(id) {
  modal('Supprimer ce lieu ?', 'Les scènes liées à ce lieu ne seront pas supprimées mais perdront leur localisation.', () => {
    ARCANUM.Lieux.delete(id);
    currentId = null;
    renderTree();
    document.getElementById('mainPanel').innerHTML = `<div class="welcome-lieu"><h2>Lieux</h2><p>Sélectionnez un lieu.</p></div>`;
  });
}

// ── FORM ──────────────────────────────────────────────────────
function renderForm() {
  const lieu = ARCANUM.Lieux.get(currentId);
  if (!lieu) return;

  const typeTr = { planete:'Planète', ville:'Ville', vaisseau:'Vaisseau' };
  const typeCls = { planete:'type-planete', ville:'type-ville', vaisseau:'type-vaisseau' };

  // Parent selector (pour villes)
  let parentField = '';
  if (lieu.type === 'ville') {
    const planetes = ARCANUM.Lieux.planetes();
    const opts = planetes.map(p =>
      `<option value="${p.id}" ${lieu.parentId===p.id?'selected':''}>${esc(p.nom||'Sans nom')}</option>`
    ).join('');
    parentField = `
      <div class="fi"><label>Planète parente</label>
        <select id="parentSel" onchange="updateField('parentId',this.value)">
          <option value="">— Aucune (vaisseau en orbite) —</option>
          ${opts}
        </select>
      </div>`;
  }
  if (lieu.type === 'vaisseau') {
    const all = Object.values(ARCANUM.Lieux.all()).filter(l => l.type !== 'vaisseau');
    const opts = all.map(l =>
      `<option value="${l.id}" ${lieu.parentId===l.id?'selected':''}>${esc(ARCANUM.Lieux.fullName(l.id))}</option>`
    ).join('');
    parentField = `
      <div class="fi"><label>Position actuelle (par défaut)</label>
        <select id="parentSel" onchange="updateField('parentId',this.value)">
          <option value="">— En transit / espace libre —</option>
          ${opts}
        </select>
      </div>`;
  }

  // Présents dans ce lieu (via scènes)
  const scenesIci = ARCANUM.Scenes.byLieu(currentId);
  const charIds = [...new Set(scenesIci.flatMap(s => s.personnageIds || []))];
  const presentsHtml = charIds.length
    ? charIds.map(cid => {
        const c = ARCANUM.Chars.get(cid);
        const av = c?.image ? `<div class="perso-av"><img src="${c.image}" alt=""></div>` : `<div class="perso-av">${ARCANUM.Chars.initials(cid)}</div>`;
        return `<div class="perso-chip">${av}<span>${esc(ARCANUM.Chars.name(cid))}</span></div>`;
      }).join('')
    : '<span style="font-size:var(--text-xs);color:var(--ink3)">Aucun personnage associé via des scènes.</span>';

  // Scènes récentes
  const recentScenes = scenesIci.slice(0, 6);
  const scenesHtml = recentScenes.length
    ? recentScenes.map(s => {
        const chap = ARCANUM.Chapitres.get(s.chapitreId);
        const chapLabel = chap ? `Ch. ${chap.numero}` : '—';
        const persoNames = (s.personnageIds||[]).slice(0,3).map(id => ARCANUM.Chars.name(id)).join(', ');
        return `<a class="scene-item" href="scenes.html">
          <span class="scene-chap">${esc(chapLabel)}</span>
          <span class="scene-titre">${esc(s.titre||'Scène sans titre')}</span>
          <span class="scene-persos">${esc(persoNames)}</span>
        </a>`;
      }).join('')
    : '<span style="font-size:var(--text-xs);color:var(--ink3)">Aucune scène dans ce lieu encore.</span>';

  // Color presets
  const presetsHtml = PRESETS.map(c =>
    `<div class="cp${lieu.couleur===c?' active':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');

  // Tags
  const tagsHtml = (lieu.tags||[]).map((t,i) =>
    `<div class="tag">${esc(t)}<span class="tag-del" onclick="removeTag(${i})">×</span></div>`
  ).join('');

  const imgStyle = lieu.image ? '' : 'display:none';
  const phStyle  = lieu.image ? 'display:none' : '';

  document.getElementById('mainPanel').innerHTML = `
  <div class="form-tb">
    <div class="form-tb-l">
      <input class="lieu-title-inp" value="${esc(lieu.nom||'')}" placeholder="Nom du lieu" id="nomInp"
        oninput="updateField('nom',this.value); updateBadge()">
      <span class="type-badge ${typeCls[lieu.type]}" id="typeBadge">${typeTr[lieu.type]}</span>
    </div>
    <div class="form-tb-r">
      <button class="btn btdng btsm" onclick="deleteLieu('${lieu.id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
      <button class="btn btd btsm" onclick="saveForm()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Sauvegarder
      </button>
    </div>
  </div>

  <div class="form-body">

    <div class="sec"><div class="sec-lbl">Informations</div>
      <div class="g2">
        <div class="fi"><label>Nom</label>
          <input type="text" id="f-nom" value="${esc(lieu.nom||'')}" placeholder="Nom du lieu" oninput="updateField('nom',this.value);document.getElementById('nomInp').value=this.value">
        </div>
        <div class="fi"><label>Type</label>
          <select id="f-type" onchange="updateField('type',this.value);renderTree();renderForm()">
            <option value="planete" ${lieu.type==='planete'?'selected':''}>Planète</option>
            <option value="ville"   ${lieu.type==='ville'  ?'selected':''}>Ville / Zone</option>
            <option value="vaisseau"${lieu.type==='vaisseau'?'selected':''}>Vaisseau</option>
          </select>
        </div>
        ${parentField}
      </div>
    </div>

    <div class="sec"><div class="sec-lbl">Description</div>
      <div class="fi">
        <textarea id="f-desc" placeholder="Atmosphère, caractéristiques, histoire…" oninput="updateField('description',this.value)">${esc(lieu.description||'')}</textarea>
      </div>
    </div>

    <div class="sec"><div class="sec-lbl">Couleur & tags</div>
      <div class="color-row">
        <div class="color-swatch" style="background:${lieu.couleur||'#b0afa9'}" id="swatchEl">
          <input type="color" value="${lieu.couleur||'#b0afa9'}" oninput="pickColor(this.value)">
        </div>
        <div class="color-presets">${presetsHtml}</div>
      </div>
      <div class="tags-wrap" id="tagsWrap">
        ${tagsHtml}
        <input class="tag-inp" id="tagInp" placeholder="+ tag…" onkeydown="addTag(event)">
      </div>
    </div>

    <div class="sec"><div class="sec-lbl">Image / illustration</div>
      <div class="img-upload" id="imgUpload">
        <img id="imgPreview" src="${lieu.image||''}" alt="" style="${imgStyle}">
        <svg id="imgPh" viewBox="0 0 24 24" style="${phStyle}"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span id="imgSpan" style="${phStyle}">Cliquer pour ajouter une image</span>
        <input type="file" accept="image/*" onchange="handleImg(event)">
      </div>
      ${lieu.image ? `<button class="btn btg btsm" style="margin-top:6px" onclick="removeImg()">Supprimer l'image</button>` : ''}
    </div>

    <div class="sec"><div class="sec-lbl">Personnages présents (via scènes)</div>
      <div class="persos-grid">${presentsHtml}</div>
    </div>

    <div class="sec"><div class="sec-lbl">Scènes dans ce lieu</div>
      <div class="scenes-list">${scenesHtml}</div>
      <a href="scenes.html" class="btn bto btsm" style="margin-top:10px;width:fit-content">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter une scène ici
      </a>
    </div>

  </div>`;
}

// ── FIELD UPDATES ─────────────────────────────────────────────
function updateField(field, val) {
  if (!currentId) return;
  const lieu = ARCANUM.Lieux.get(currentId);
  if (!lieu) return;
  lieu[field] = val;
  ARCANUM.Lieux.save(lieu);
  if (field === 'nom') renderTree();
}

function updateBadge() {
  // no-op; title synced via oninput
}

function saveForm() {
  if (!currentId) return;
  const lieu = ARCANUM.Lieux.get(currentId);
  if (!lieu) return;
  lieu.nom = document.getElementById('f-nom')?.value || lieu.nom;
  lieu.description = document.getElementById('f-desc')?.value || lieu.description;
  ARCANUM.Lieux.save(lieu);
  renderTree();
  toast('Sauvegardé ✓');
}

// ── COLOR ──────────────────────────────────────────────────────
function pickColor(col) {
  if (!currentId) return;
  updateField('couleur', col);
  document.getElementById('swatchEl').style.background = col;
  document.querySelectorAll('.cp').forEach(el => el.classList.toggle('active', el.style.background === col || el.style.background === hexToRgb(col)));
  renderTree();
}
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

// ── TAGS ──────────────────────────────────────────────────────
function addTag(evt) {
  if (evt.key !== 'Enter') return;
  const val = evt.target.value.trim();
  if (!val || !currentId) return;
  const lieu = ARCANUM.Lieux.get(currentId);
  if (!lieu) return;
  lieu.tags = [...(lieu.tags||[]), val];
  ARCANUM.Lieux.save(lieu);
  evt.target.value = '';
  renderForm();
}
function removeTag(idx) {
  if (!currentId) return;
  const lieu = ARCANUM.Lieux.get(currentId);
  if (!lieu) return;
  lieu.tags = (lieu.tags||[]).filter((_,i) => i !== idx);
  ARCANUM.Lieux.save(lieu);
  renderForm();
}

// ── IMAGE ──────────────────────────────────────────────────────
function handleImg(evt) {
  const file = evt.target.files[0]; if (!file || !currentId) return;
  const r = new FileReader();
  r.onload = e => {
    updateField('image', e.target.result);
    renderForm();
  };
  r.readAsDataURL(file);
}
function removeImg() {
  updateField('image', '');
  renderForm();
}

// ── EXPORT ────────────────────────────────────────────────────
function exportLieux() {
  ARCANUM.IO.downloadJSON({ lieux: ARCANUM.Lieux.all() }, 'arcanum_lieux.json');
}

// ── UTILS ──────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function modal(title, msg, onOk) {
  const m = document.createElement('div'); m.className = 'modal-bg';
  m.innerHTML = `<div class="modal"><h3>${title}</h3><p>${msg}</p><div class="modal-acts">
    <button class="btn bto btsm" onclick="this.closest('.modal-bg').remove()">Annuler</button>
    <button class="btn btd btsm" id="mOk">Confirmer</button>
  </div></div>`;
  document.body.appendChild(m);
  m.querySelector('#mOk').onclick = () => { m.remove(); onOk(); };
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
}

// ── INIT ──────────────────────────────────────────────────────
renderTree();
</script>
</body>
</html>
