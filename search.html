<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Recherche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
:root{
  --bg:#f7f6f3;--sf:#fff;--sf2:#f2f1ee;--sf3:#eae9e5;
  --ink:#1a1917;--ink2:#6b6861;--ink3:#b0afa9;
  --ln:#e4e3df;--ln2:#d0cfc9;
  --accent:#1a1917;--accent-bg:#f0efeb;
  --red:#c0392b;
  --r:8px;--rl:12px;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:var(--text-base);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:99px}

/* TOP */
.topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--ln);background:var(--sf);gap:10px}
.back{display:flex;align-items:center;gap:5px;font-size:var(--text-sm);color:var(--ink3);text-decoration:none;border:1px solid var(--ln);border-radius:var(--r);padding:5px 10px;transition:all .12s}
.back:hover{color:var(--ink);border-color:var(--ink2)}.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* SEARCH BAR */
.search-hero{padding:24px 18px 0;flex-shrink:0}
.search-box{position:relative;max-width:720px;margin:0 auto}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ink3);fill:none;stroke-width:1.8;pointer-events:none}
#globalSearch{width:100%;padding:13px 16px 13px 44px;font-family:var(--sans);font-size:var(--text-md);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);outline:none;transition:border-color .15s,box-shadow .15s}
#globalSearch:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,25,23,.06)}
#globalSearch::placeholder{color:var(--ink3)}
.search-meta{max-width:720px;margin:8px auto 0;display:flex;align-items:center;justify-content:space-between}
.search-count{font-size:var(--text-xs);color:var(--ink3)}
.filter-row{display:flex;gap:5px}
.chip{padding:3px 9px;border-radius:99px;border:1px solid var(--ln);font-size:var(--text-xs);cursor:pointer;background:transparent;color:var(--ink2);font-family:var(--sans);transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--ink2)}.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* RESULTS */
.results-wrap{flex:1;overflow-y:auto;padding:16px 18px 40px}
.results-inner{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:24px}

/* GROUP */
.result-group{}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.group-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.group-icon svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2}
.group-label{font-size:var(--text-xs);font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.group-cnt{font-size:var(--text-xs);font-family:var(--mono);color:var(--ink3)}

/* RESULT CARD */
.result-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);cursor:pointer;text-decoration:none;color:inherit;transition:border-color .12s,box-shadow .12s;margin-bottom:5px}
.result-card:hover{border-color:var(--ln2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.result-card:last-child{margin-bottom:0}
.rc-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:500;color:var(--ink3);overflow:hidden;background:var(--sf3)}
.rc-av img{width:100%;height:100%;object-fit:cover}
.rc-av.sq{border-radius:8px}
.rc-body{flex:1;min-width:0}
.rc-title{font-size:var(--text-base);font-weight:500;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rc-badge{font-size:var(--text-xs);padding:1px 7px;border-radius:99px;background:var(--sf3);color:var(--ink3);border:1px solid var(--ln);font-weight:400}
.rc-sub{font-size:var(--text-xs);color:var(--ink3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-excerpt{font-size:var(--text-xs);color:var(--ink2);line-height:1.6}
/* Highlight */
mark{background:#fff3b0;color:var(--ink);border-radius:2px;padding:0 1px;font-style:normal}

/* EMPTY / WELCOME */
.search-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;text-align:center}
.search-empty svg{width:36px;height:36px;stroke:var(--ln2);fill:none;stroke-width:1.2}
.search-empty h3{font-size:var(--text-base);font-weight:400;color:var(--ink2)}
.search-empty p{font-size:var(--text-sm);color:var(--ink3);line-height:1.9}

.search-welcome{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:20px}
.search-welcome h2{font-size:16px;font-weight:300;color:var(--ink2);letter-spacing:.08em}
.shortcuts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;max-width:720px;width:100%}
.shortcut-card{padding:14px 16px;background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);cursor:pointer;transition:border-color .12s;text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px}
.shortcut-card:hover{border-color:var(--ln2)}
.sc-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.8}
.sc-label{font-size:var(--text-sm);font-weight:500;color:var(--ink)}
.sc-cnt{font-size:var(--text-xs);color:var(--ink3);display:block;margin-top:1px}

/* TYPE COLORS */
.t-perso{background:#5B8DB8}.t-lieu{background:#7BAF7B}.t-scene{background:#9B7BB5}.t-chap{background:#C4A35A}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil
  </a>
</div>

<div class="search-hero">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="globalSearch" type="search" placeholder="Chercher dans personnages, lieux, scènes, chapitres…" autocomplete="off" autofocus oninput="onSearch()">
  </div>
  <div class="search-meta">
    <span class="search-count" id="searchCount"></span>
    <div class="filter-row" id="filterRow">
      <button class="chip active" data-type="all" onclick="setType('all',this)">Tout</button>
      <button class="chip" data-type="perso" onclick="setType('perso',this)">Personnages</button>
      <button class="chip" data-type="lieu" onclick="setType('lieu',this)">Lieux</button>
      <button class="chip" data-type="scene" onclick="setType('scene',this)">Scènes</button>
      <button class="chip" data-type="chap" onclick="setType('chap',this)">Chapitres</button>
    </div>
  </div>
</div>

<div class="results-wrap" id="resultsWrap">
  <div class="results-inner" id="resultsInner">
    <!-- welcome state -->
  </div>
</div>

<script src="arcanum.js"></script>
<script>
let activeType = 'all';
let searchTimer = null;

// ═══════════════════════════════════════════════
// SEARCH ENGINE
// ═══════════════════════════════════════════════

function setType(type, el) {
  activeType = type;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  onSearch();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 80);
}

function doSearch() {
  const q = document.getElementById('globalSearch').value.trim();
  if (!q) { showWelcome(); return; }
  const results = search(q, activeType);
  renderResults(results, q);
}

// Core search — returns grouped results
function search(q, type) {
  const ql = q.toLowerCase();
  const words = ql.split(/\s+/).filter(Boolean);
  const results = { perso: [], lieu: [], scene: [], chap: [] };

  // ── PERSONNAGES ──────────────────────────────
  if (type === 'all' || type === 'perso') {
    ARCANUM.Chars.list().forEach(c => {
      const fields = [
        c.prenom, c.nom, c.surnom, c.role, c.typeRole,
        c.lieuNaissance, c.lieuVie, c.nationalite,
        c.notes, c.notePerso, c.passe, c.evolution,
        c.valeurs, c.horreur, c.mensonge, c.justice,
        c.aime, c.deteste, c.emploi, c.style,
        c.ticsLangage, c.langageCorporel,
        ...(c.relations||[]).map(r => r.charName + ' ' + r.type + ' ' + r.note),
      ].filter(Boolean).join(' ');

      const score = scoreMatch(fields, words);
      if (score > 0) {
        const excerpt = bestExcerpt(fields, words, 120);
        results.perso.push({ id: c.id, score, data: c, excerpt });
      }
    });
    results.perso.sort((a,b) => b.score - a.score);
  }

  // ── LIEUX ────────────────────────────────────
  if (type === 'all' || type === 'lieu') {
    Object.values(ARCANUM.Lieux.all()).forEach(l => {
      const fields = [
        l.nom, l.type, l.description,
        ...(l.tags||[]),
        ARCANUM.Lieux.fullName(l.id),
      ].filter(Boolean).join(' ');

      const score = scoreMatch(fields, words);
      if (score > 0) {
        const excerpt = bestExcerpt(fields, words, 120);
        results.lieu.push({ id: l.id, score, data: l, excerpt });
      }
    });
    results.lieu.sort((a,b) => b.score - a.score);
  }

  // ── SCÈNES ───────────────────────────────────
  if (type === 'all' || type === 'scene') {
    Object.values(ARCANUM.Scenes.all()).forEach(s => {
      const chap = ARCANUM.Chapitres.get(s.chapitreId);
      const lieu = ARCANUM.Lieux.get(s.lieuId);
      const persoNames = (s.personnageIds||[]).map(id => ARCANUM.Chars.name(id)).join(' ');
      const fields = [
        s.titre, s.note, s.dateFiction, s.heureFiction,
        chap?.titre, chap?.numero ? 'chapitre ' + chap.numero : '',
        lieu?.nom, persoNames,
      ].filter(Boolean).join(' ');

      const score = scoreMatch(fields, words);
      if (score > 0) {
        const excerpt = bestExcerpt(fields, words, 120);
        results.scene.push({ id: s.id, score, data: s, excerpt, chap, lieu, persoNames });
      }
    });
    results.scene.sort((a,b) => {
      const na = ARCANUM.Chapitres.get(a.data.chapitreId)?.numero || 0;
      const nb = ARCANUM.Chapitres.get(b.data.chapitreId)?.numero || 0;
      return na - nb || b.score - a.score;
    });
  }

  // ── CHAPITRES ────────────────────────────────
  if (type === 'all' || type === 'chap') {
    ARCANUM.Chapitres.list().forEach(ch => {
      const fields = [
        'chapitre ' + ch.numero, ch.titre, ch.acte,
        ch.dateFiction, ch.description,
      ].filter(Boolean).join(' ');

      const score = scoreMatch(fields, words);
      if (score > 0) {
        const sceneCnt = ARCANUM.Scenes.byChap(ch.id).length;
        results.chap.push({ id: ch.id, score, data: ch, excerpt: bestExcerpt(fields, words, 100), sceneCnt });
      }
    });
    results.chap.sort((a,b) => (a.data.numero||0) - (b.data.numero||0));
  }

  return results;
}

// ── SCORING ───────────────────────────────────────────────────
function scoreMatch(text, words) {
  const tl = text.toLowerCase();
  let score = 0;
  for (const w of words) {
    if (!tl.includes(w)) return 0; // all words must match
    // Exact word boundary bonus
    const re = new RegExp(`\\b${escRe(w)}`, 'gi');
    const matches = tl.match(re);
    score += matches ? matches.length * 2 : 1;
    // Title/name bonus (first 60 chars)
    if (tl.slice(0, 60).includes(w)) score += 3;
  }
  return score;
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── BEST EXCERPT ──────────────────────────────────────────────
function bestExcerpt(text, words, maxLen) {
  if (!text) return '';
  // Find position of first word match
  const tl = text.toLowerCase();
  let best = 0;
  for (const w of words) {
    const idx = tl.indexOf(w);
    if (idx >= 0) { best = idx; break; }
  }
  const start = Math.max(0, best - 30);
  const raw = text.slice(start, start + maxLen);
  const prefix = start > 0 ? '…' : '';
  const suffix = start + maxLen < text.length ? '…' : '';
  return prefix + raw + suffix;
}

// ── HIGHLIGHT ─────────────────────────────────────────────────
function highlight(text, words) {
  if (!text) return '';
  let result = esc(text);
  words.forEach(w => {
    const re = new RegExp(`(${escRe(esc(w))})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function renderResults(results, q) {
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  const total = results.perso.length + results.lieu.length + results.scene.length + results.chap.length;
  document.getElementById('searchCount').textContent =
    total ? `${total} résultat${total>1?'s':''}` : '';

  if (!total) {
    document.getElementById('resultsInner').innerHTML = `
      <div class="search-empty">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>Aucun résultat pour « ${esc(q)} »</h3>
        <p>Essayez un autre mot-clé, ou vérifiez l'orthographe.</p>
      </div>`;
    return;
  }

  let html = '';

  // ── PERSONNAGES ──────────────────────────────
  if (results.perso.length) {
    html += `<div class="result-group">
      <div class="group-header">
        <div class="group-icon t-perso"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        <span class="group-label">Personnages</span>
        <span class="group-cnt">${results.perso.length}</span>
      </div>`;
    results.perso.slice(0, 8).forEach(r => {
      const c = r.data;
      const name = ARCANUM.Chars.name(c.id);
      const av = c.image
        ? `<div class="rc-av"><img src="${c.image}" alt=""></div>`
        : `<div class="rc-av">${ARCANUM.Chars.initials(c.id)}</div>`;
      html += `<a class="result-card" href="personnages.html#${c.id}">
        ${av}
        <div class="rc-body">
          <div class="rc-title">${highlight(name, words)}${c.role?`<span class="rc-badge">${esc(c.role)}</span>`:''}</div>
          <div class="rc-sub">${esc([c.lieuNaissance, c.lieuVie, c.nationalite].filter(Boolean).join(' · ') || '—')}</div>
          ${r.excerpt?`<div class="rc-excerpt">${highlight(r.excerpt, words)}</div>`:''}
        </div>
      </a>`;
    });
    if (results.perso.length > 8) html += `<div style="font-size:var(--text-xs);color:var(--ink3);padding:4px 0">+ ${results.perso.length-8} autres résultats — affinez la recherche.</div>`;
    html += `</div>`;
  }

  // ── LIEUX ────────────────────────────────────
  if (results.lieu.length) {
    html += `<div class="result-group">
      <div class="group-header">
        <div class="group-icon t-lieu"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
        <span class="group-label">Lieux</span>
        <span class="group-cnt">${results.lieu.length}</span>
      </div>`;
    results.lieu.slice(0, 6).forEach(r => {
      const l = r.data;
      const col = ARCANUM.lieuColor(l.id);
      const typeLabel = {planete:'Planète',ville:'Ville',vaisseau:'Vaisseau'}[l.type]||l.type;
      const dot = `<div class="rc-av sq" style="background:${col}20;border-color:${col}40"><div style="width:14px;height:14px;border-radius:3px;background:${col}"></div></div>`;
      html += `<a class="result-card" href="lieux.html#${l.id}">
        ${dot}
        <div class="rc-body">
          <div class="rc-title">${highlight(l.nom||'Sans nom', words)}<span class="rc-badge">${typeLabel}</span></div>
          <div class="rc-sub">${esc(ARCANUM.Lieux.fullName(l.id))}</div>
          ${r.excerpt?`<div class="rc-excerpt">${highlight(r.excerpt, words)}</div>`:''}
        </div>
      </a>`;
    });
    html += `</div>`;
  }

  // ── SCÈNES ───────────────────────────────────
  if (results.scene.length) {
    html += `<div class="result-group">
      <div class="group-header">
        <div class="group-icon t-scene"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <span class="group-label">Scènes</span>
        <span class="group-cnt">${results.scene.length}</span>
      </div>`;
    results.scene.slice(0, 8).forEach(r => {
      const s = r.data;
      const chapLabel = r.chap ? `Ch.${r.chap.numero}` : '—';
      const lieuLabel = r.lieu?.nom || '—';
      const lieuCol = s.lieuId ? ARCANUM.lieuColor(s.lieuId) : '#b0afa9';
      html += `<a class="result-card" href="scenes.html#${s.id}">
        <div class="rc-av sq" style="background:${lieuCol}15;border-color:${lieuCol}30;font-family:var(--mono);font-size:var(--text-xs);color:${lieuCol}">${esc(chapLabel)}</div>
        <div class="rc-body">
          <div class="rc-title">${highlight(s.titre||'Scène sans titre', words)}</div>
          <div class="rc-sub">${esc(lieuLabel)} · ${esc(r.persoNames||'—')}${s.dateFiction?' · '+s.dateFiction:''}</div>
          ${r.excerpt?`<div class="rc-excerpt">${highlight(r.excerpt, words)}</div>`:''}
        </div>
      </a>`;
    });
    if (results.scene.length > 8) html += `<div style="font-size:var(--text-xs);color:var(--ink3);padding:4px 0">+ ${results.scene.length-8} autres scènes.</div>`;
    html += `</div>`;
  }

  // ── CHAPITRES ────────────────────────────────
  if (results.chap.length) {
    html += `<div class="result-group">
      <div class="group-header">
        <div class="group-icon t-chap"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
        <span class="group-label">Chapitres</span>
        <span class="group-cnt">${results.chap.length}</span>
      </div>`;
    results.chap.forEach(r => {
      const ch = r.data;
      html += `<a class="result-card" href="scenes.html#chap-${ch.id}">
        <div class="rc-av sq t-chap" style="font-family:var(--mono);font-size:var(--text-xs);color:#fff;background:#C4A35A">
          ${ch.numero}
        </div>
        <div class="rc-body">
          <div class="rc-title">${highlight(ch.titre||'Sans titre', words)}${ch.acte?`<span class="rc-badge">${esc(ch.acte)}</span>`:''}</div>
          <div class="rc-sub">${ch.dateFiction?esc(ch.dateFiction)+' · ':''} ${r.sceneCnt} scène${r.sceneCnt!==1?'s':''}</div>
          ${r.excerpt?`<div class="rc-excerpt">${highlight(r.excerpt, words)}</div>`:''}
        </div>
      </a>`;
    });
    html += `</div>`;
  }

  document.getElementById('resultsInner').innerHTML = html;
}

// ═══════════════════════════════════════════════
// WELCOME STATE
// ═══════════════════════════════════════════════

function showWelcome() {
  document.getElementById('searchCount').textContent = '';
  const chars  = ARCANUM.Chars.list().length;
  const lieux  = Object.keys(ARCANUM.Lieux.all()).length;
  const scenes = Object.keys(ARCANUM.Scenes.all()).length;
  const chaps  = ARCANUM.Chapitres.list().length;

  document.getElementById('resultsInner').innerHTML = `
    <div class="search-welcome">
      <h2>Recherche globale</h2>
      <div class="shortcuts-grid">
        <a class="shortcut-card" href="personnages.html">
          <div class="sc-icon t-perso"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
          <div><div class="sc-label">Personnages</div><span class="sc-cnt">${chars} fiche${chars!==1?'s':''}</span></div>
        </a>
        <a class="shortcut-card" href="lieux.html">
          <div class="sc-icon t-lieu"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>

        <a class="shortcut-card" href="scenes.html">

    </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('globalSearch')) {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
});

// Init
showWelcome();
</script>
