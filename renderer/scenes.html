<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Scènes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
html,body{height:100%;overflow:hidden}body{display:flex;flex-direction:column}
.ws{display:flex;flex:1;overflow:hidden}
.sb{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--ln);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:var(--sp-4);border-bottom:1px solid var(--ln)}
.chap-list{flex:1;overflow-y:auto;padding:var(--sp-2)}
.chap-item{border:1px solid var(--ln);border-radius:var(--r);margin-bottom:var(--sp-2);overflow:hidden;transition:border-color .12s}
.chap-item:hover{border-color:var(--ln2)}.chap-item.active{border-color:var(--ink)}
.chap-head{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);cursor:pointer;user-select:none}
.chap-num{font-family:var(--mono);font-size:var(--text-xs);color:var(--ink3);width:30px;flex-shrink:0}
.chap-info{flex:1;min-width:0}
.chap-titre{font-size:var(--text-sm);font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chap-date{font-size:var(--text-xs);color:var(--ink3)}
.chap-cnt{font-size:var(--text-xs);font-family:var(--mono);color:var(--ink3);flex-shrink:0}
.chap-edit-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--ink3);display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;transition:all .1s}
.chap-edit-btn:hover{color:var(--ink);background:var(--sf2)}.chap-edit-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}
.chap-scenes{padding:var(--sp-1) var(--sp-2) var(--sp-2);display:flex;flex-direction:column;gap:2px}
.scene-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) var(--sp-3);border-radius:5px;cursor:pointer;transition:background .1s;border:1px solid transparent}
.scene-row:hover{background:var(--sf2)}.scene-row.active{background:var(--sf2);border-color:var(--ln2)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.slabel{font-size:var(--text-xs);color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sloc{font-size:var(--text-xs);color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.sb-foot{padding:var(--sp-3);border-top:1px solid var(--ln)}
.empty-sb{text-align:center;color:var(--ink3);font-size:var(--text-xs);padding:var(--sp-8) var(--sp-4);line-height:2}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:var(--sp-3);text-align:center;padding:var(--sp-8)}
.welc h2{font-size:var(--text-lg);font-weight:300;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase}
.welc p{font-size:var(--text-sm);color:var(--ink3);line-height:1.9}
.ftb{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 var(--sp-6);border-bottom:1px solid var(--ln);background:var(--sf);gap:var(--sp-3)}
.stinp{font-family:var(--sans);font-size:var(--text-md);font-weight:500;color:var(--ink);border:none;background:transparent;outline:none;flex:1;min-width:80px}
.stinp::placeholder{color:var(--ink3)}
.ftb-r{display:flex;gap:var(--sp-2);flex-shrink:0}
.fbody{flex:1;overflow-y:auto;padding:var(--sp-6)}
.meta-card{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp-4);margin-bottom:var(--sp-6);padding:var(--sp-5);border:1px solid var(--ln);border-radius:var(--rl);background:var(--sf)}
.fg{margin-bottom:var(--sp-6)}
.lieu-hier{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;margin-bottom:var(--sp-3)}
.lieu-hier select{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);padding:var(--sp-2) var(--sp-4);outline:none;cursor:pointer}
.lieu-hier select:focus{border-color:var(--ink)}
.larrow{font-size:var(--text-sm);color:var(--ink3)}
.lieu-badge{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);border-radius:99px;border:1px solid var(--ln);font-size:var(--text-xs);color:var(--ink2);background:var(--sf2);margin-top:var(--sp-3)}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.perso-sw{position:relative}
.perso-inp{width:100%;font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);outline:none}
.perso-inp:focus{border-color:var(--ink)}.perso-inp::placeholder{color:var(--ink3)}
.pdrop{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--sf);border:1px solid var(--ln2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:200;max-height:200px;overflow-y:auto}
.pdi{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);cursor:pointer;transition:background .1s}
.pdi:hover,.pdi.sel{background:var(--sf2)}
.pav{width:24px;height:24px;border-radius:50%;background:var(--sf3);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:var(--text-xs);color:var(--ink3);flex-shrink:0;overflow:hidden}
.pav img{width:100%;height:100%;object-fit:cover}
.pname{font-size:var(--text-sm);color:var(--ink)}.prole{font-size:var(--text-xs);color:var(--ink3);margin-left:auto}
.ptags{display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-3)}
.ptag{display:flex;align-items:center;gap:var(--sp-2);padding:3px var(--sp-3) 3px var(--sp-2);border-radius:99px;border:1px solid var(--ln);background:var(--sf);font-size:var(--text-xs);color:var(--ink2)}
.ptag-av{width:16px;height:16px;border-radius:50%;background:var(--sf3);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:8px;overflow:hidden;flex-shrink:0}
.ptag-av img{width:100%;height:100%;object-fit:cover}
.ptag-del{cursor:pointer;color:var(--ink3);font-size:14px;line-height:1;transition:color .1s;margin-left:2px}.ptag-del:hover{color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(26,25,23,.4);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--sf);border-radius:var(--rl);padding:var(--sp-8);max-width:420px;width:92%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:var(--text-md);font-weight:500;margin-bottom:var(--sp-4)}
.modal p{font-size:var(--text-sm);color:var(--ink2);line-height:1.7;margin-bottom:var(--sp-6)}
.modal-actions{display:flex;justify-content:flex-end;gap:var(--sp-3);margin-top:var(--sp-5)}
.mfi{display:flex;flex-direction:column;gap:var(--sp-2);margin-bottom:var(--sp-4)}
.mfi label{font-size:var(--text-xs);color:var(--ink2)}
.mfi input,.mfi select,.mfi textarea{font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf2);border:1px solid var(--ln);border-radius:var(--r);padding:var(--sp-3) var(--sp-4);outline:none;width:100%}
.mfi input:focus{border-color:var(--ink)}.mfi textarea{resize:vertical;min-height:60px;line-height:1.6}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil</a>
  <span class="page-title">Scènes</span>
  <div style="margin-left:auto">
    <button class="btn btn-outline" style="font-size:var(--text-xs)" onclick="showChapModal()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau chapitre
    </button>
  </div>
</div>
<div class="ws">
  <aside class="sb">
    <div class="sb-head"><div style="font-size:var(--text-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:500">Chapitres & scènes</div></div>
    <div class="chap-list" id="chapList"><div class="empty-sb">Chargement…</div></div>
    <div class="sb-foot"><button class="new-btn" onclick="showChapModal()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau chapitre</button></div>
  </aside>
  <main class="main" id="mainPanel">
    <div class="welc"><h2>Scènes</h2><p>Sélectionnez un chapitre ou créez-en un.</p></div>
  </main>
</div>
<script src="arcanum-client.js"></script>
<script>
let chapId = null, sceneId = null, pdIdx = -1;

// ── SIDEBAR ───────────────────────────────────
async function renderSB() {
  const chaps = await AC.Chapitres.list();
  await AC.Scenes.all(); await AC.Lieux.all();
  const el = document.getElementById('chapList');
  if (!chaps.length) { el.innerHTML='<div class="empty-sb">Aucun chapitre.<br>Créez-en un pour commencer.</div>'; return; }
  el.innerHTML = chaps.map(ch => {
    const scenes = AC.Scenes.byChap(ch.id);
    const active = ch.id === chapId;
    const sRows = active ? scenes.map(s => {
      const lieu = s.lieuId ? AC.Lieux.get(s.lieuId) : null;
      const col = lieu ? AC.Lieux.color(s.lieuId) : '#d0cfc9';
      return `<div class="scene-row${s.id===sceneId?' active':''}" onclick="selScene('${s.id}')">
        <div class="sdot" style="background:${col}"></div>
        <span class="slabel">${AC.esc(s.titre||'Scène sans titre')}</span>
        <span class="sloc">${AC.esc(lieu?.nom||'—')}</span>
      </div>`;
    }).join('') + `<button class="new-btn" style="margin-top:var(--sp-2)" onclick="newScene('${ch.id}')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter une scène</button>` : '';
    return `<div class="chap-item${active?' active':''}">
      <div class="chap-head" onclick="toggleChap('${ch.id}')">
        <span class="chap-num">Ch.${ch.numero}</span>
        <div class="chap-info"><div class="chap-titre">${AC.esc(ch.titre||'Sans titre')}</div>${ch.dateFiction?`<div class="chap-date">${AC.esc(ch.dateFiction)}</div>`:''}</div>
        <span class="chap-cnt">${scenes.length}</span>
        <button class="chap-edit-btn" onclick="event.stopPropagation();showChapModal('${ch.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      </div>
      ${active?`<div class="chap-scenes">${sRows}</div>`:''}
    </div>`;
  }).join('');
}

function toggleChap(id) { chapId = chapId===id?null:id; if(chapId!==id)sceneId=null; renderSB(); if(!chapId)welc(); }
function welc() { document.getElementById('mainPanel').innerHTML='<div class="welc"><h2>Scènes</h2><p>Sélectionnez une scène ou créez-en une.</p></div>'; }
function selScene(id) { sceneId=id; renderSB(); renderForm(); }

async function newScene(cid) {
  const s = await AC.Scenes.defaultNew(cid);
  const saved = await AC.Scenes.save(s);
  chapId=cid; sceneId=saved.id; renderSB(); renderForm();
}

function delScene(id) {
  AC.modal('Supprimer cette scène ?','Cette action est irréversible.',async()=>{
    await AC.Scenes.delete(id); sceneId=null; renderSB(); welc();
  });
}

async function updScene(field,val) {
  const s=AC.Scenes.get(sceneId); if(!s)return;
  s[field]=val; await AC.Scenes.save(s); renderSB();
}

// ── FORM ──────────────────────────────────────
async function renderForm() {
  const s=AC.Scenes.get(sceneId); if(!s)return;
  const chaps=await AC.Chapitres.list();
  const chap=AC.Chapitres.get(s.chapitreId);
  const lieux=Object.values(await AC.Lieux.all());
  const chapOpts=chaps.map(c=>`<option value="${c.id}"${s.chapitreId===c.id?' selected':''}>${AC.esc(`Ch.${c.numero} — ${c.titre||'Sans titre'}`)}</option>`).join('');
  const lieuHtml=buildLieuSel(s.lieuId,lieux);
  const tags=buildPTags(s.personnageIds||[]);

  document.getElementById('mainPanel').innerHTML=`
  <div class="ftb">
    <input class="stinp" value="${AC.esc(s.titre||'')}" placeholder="Titre de la scène" oninput="updScene('titre',this.value)">
    <span style="font-size:var(--text-xs);color:var(--ink3);flex-shrink:0">${AC.esc(chap?`Ch.${chap.numero} — ${chap.titre||''}`:'-')}</span>
    <div class="ftb-r">
      <button class="btn btn-ghost" onclick="delScene('${s.id}')"><svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      <button class="btn btn-dark" style="font-size:var(--text-xs)" onclick="AC.toast('Sauvegardé ✓')"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Sauvegarder</button>
    </div>
  </div>
  <div class="fbody">
    <div class="meta-card">
      <div class="field"><label>Chapitre</label><select onchange="updScene('chapitreId',this.value);chapId=this.value;renderSB()">${chapOpts}</select></div>
      <div class="field"><label>Date fictive</label><input type="text" value="${AC.esc(s.dateFiction||'')}" placeholder="Jour 42…" oninput="updScene('dateFiction',this.value)"></div>
      <div class="field"><label>Heure fictive</label><input type="text" value="${AC.esc(s.heureFiction||'')}" placeholder="Aube, 14h…" oninput="updScene('heureFiction',this.value)"></div>
    </div>
    <div class="fg"><div class="section-label">Lieu</div><div id="lieuWrap">${lieuHtml}</div></div>
    <div class="fg"><div class="section-label">Personnages présents</div>
      <div class="perso-sw"><input class="perso-inp" id="pInp" placeholder="Rechercher un personnage…" autocomplete="off" oninput="showPDrop(this)" onfocus="showPDrop(this)" onkeydown="pdKey(event)"></div>
      <div class="ptags" id="ptags">${tags}</div>
    </div>
    <div class="fg"><div class="section-label">Résumé & notes</div>
      <div class="field"><textarea placeholder="Ce qui se passe…" oninput="updScene('note',this.value)">${AC.esc(s.note||'')}</textarea></div>
    </div>
    <div class="fg"><div class="section-label">Ordre dans le chapitre</div>
      <div class="field" style="max-width:100px"><input type="number" value="${s.ordre||1}" min="1" oninput="updScene('ordre',+this.value)"></div>
    </div>
  </div>`;
  document.addEventListener('click',closeDOut);
}

// ── LIEU SEL ──────────────────────────────────
function buildLieuSel(selId,lieux) {
  const planetes=lieux.filter(l=>l.type==='planete');
  const vaisseaux=lieux.filter(l=>l.type==='vaisseau');
  const sel=lieux.find(l=>l.id===selId);
  const t=sel?.type||'';
  let second='',third='';
  if(t==='planete'||t==='ville'){
    const pOpts=planetes.map(p=>`<option value="${p.id}"${(t==='planete'&&selId===p.id)||(t==='ville'&&sel?.parentId===p.id)?' selected':''}>${AC.esc(p.nom||'')}</option>`).join('');
    second=`<span class="larrow">›</span><div><select onchange="onLP(this.value,this)"><option value="">— Planète —</option>${pOpts}</select></div>`;
    if(t==='ville'){
      const villes=lieux.filter(l=>l.type==='ville'&&l.parentId===sel?.parentId);
      const vOpts=villes.map(v=>`<option value="${v.id}"${selId===v.id?' selected':''}>${AC.esc(v.nom||'')}</option>`).join('');
      third=`<span class="larrow">›</span><div><select onchange="onLF(this.value)"><option value="">— Ville —</option>${vOpts}</select></div>`;
    }
  }else if(t==='vaisseau'){
    const vOpts=vaisseaux.map(v=>`<option value="${v.id}"${selId===v.id?' selected':''}>${AC.esc(v.nom||'')}</option>`).join('');
    second=`<span class="larrow">›</span><div><select onchange="onLF(this.value)"><option value="">— Vaisseau —</option>${vOpts}</select></div>`;
  }
  const badge=selId?`<div class="lieu-badge"><div class="ldot" style="background:${AC.Lieux.color(selId)}"></div>${AC.esc(AC.Lieux.fullName(selId))}</div>`:'';
  return `<div class="lieu-hier"><div><select onchange="onLT(this.value)"><option value="">— Type —</option>
    <option value="planete"${t==='planete'?' selected':''}>Planète</option>
    <option value="ville"${t==='ville'?' selected':''}>Ville</option>
    <option value="vaisseau"${t==='vaisseau'?' selected':''}>Vaisseau</option>
  </select></div>${second}${third}</div>${badge}`;
}

async function onLT(type) {
  updScene('lieuId',null);
  const lieux=Object.values(await AC.Lieux.all());
  const planetes=lieux.filter(l=>l.type==='planete'), vaisseaux=lieux.filter(l=>l.type==='vaisseau');
  let second='';
  if(type==='planete'||type==='ville'){const pOpts=planetes.map(p=>`<option value="${p.id}">${AC.esc(p.nom||'')}</option>`).join('');second=`<span class="larrow">›</span><div><select onchange="onLP(this.value,this)"><option value="">— Planète —</option>${pOpts}</select></div>`;}
  else if(type==='vaisseau'){const vOpts=vaisseaux.map(v=>`<option value="${v.id}">${AC.esc(v.nom||'')}</option>`).join('');second=`<span class="larrow">›</span><div><select onchange="onLF(this.value)"><option value="">— Vaisseau —</option>${vOpts}</select></div>`;}
  document.getElementById('lieuWrap').innerHTML=`<div class="lieu-hier"><div><select onchange="onLT(this.value)"><option value="">— Type —</option>
    <option value="planete"${type==='planete'?' selected':''}>Planète</option>
    <option value="ville"${type==='ville'?' selected':''}>Ville</option>
    <option value="vaisseau"${type==='vaisseau'?' selected':''}>Vaisseau</option>
  </select></div>${second}</div>`;
}

async function onLP(planetId,sel) {
  const type=document.querySelector('#lieuWrap select')?.value;
  if(type==='planete'){onLF(planetId);return;}
  const lieux=Object.values(await AC.Lieux.all());
  const villes=lieux.filter(l=>l.type==='ville'&&l.parentId===planetId);
  const vOpts=villes.map(v=>`<option value="${v.id}">${AC.esc(v.nom||'')}</option>`).join('');
  const hier=document.querySelector('#lieuWrap .lieu-hier');
  const old=document.getElementById('villeStep');
  if(old){old.previousElementSibling?.remove();old.remove();}
  hier.insertAdjacentHTML('beforeend',`<span class="larrow">›</span><div id="villeStep"><select onchange="onLF(this.value)"><option value="">— Ville —</option>${vOpts}</select></div>`);
  updScene('lieuId',null);
  const b=document.querySelector('#lieuWrap .lieu-badge');if(b)b.remove();
}

function onLF(lieuId) {
  if(!lieuId)return;
  updScene('lieuId',lieuId);
  const wrap=document.getElementById('lieuWrap');
  const old=wrap?.querySelector('.lieu-badge');if(old)old.remove();
  if(lieuId&&wrap){
    wrap.insertAdjacentHTML('beforeend',`<div class="lieu-badge"><div class="ldot" style="background:${AC.Lieux.color(lieuId)}"></div>${AC.esc(AC.Lieux.fullName(lieuId))}</div>`);
  }
  renderSB();
}

// ── PERSO SELECTOR ────────────────────────────
function buildPTags(ids) {
  if(!ids.length)return`<span style="font-size:var(--text-xs);color:var(--ink3)">Aucun personnage — cherchez ci-dessus.</span>`;
  return ids.map(id=>{
    const c=AC.Chars.get(id);
    const av=c?.image?`<div class="ptag-av"><img src="${c.image}" alt=""></div>`:`<div class="ptag-av">${AC.Chars.initials(id)}</div>`;
    return `<div class="ptag">${av}<span>${AC.esc(AC.Chars.name(id))}</span><span class="ptag-del" onclick="remPerso('${id}')">×</span></div>`;
  }).join('');
}

function showPDrop(inp) {
  const q=inp.value.toLowerCase().trim();
  const s=AC.Scenes.get(sceneId);if(!s)return;
  const already=new Set(s.personnageIds||[]);
  const allC=window._chars||{};const chars=Object.values(allC).filter(c=>!already.has(c.id)&&(!q||AC.Chars.name(c.id).toLowerCase().includes(q)||(c.role||'').toLowerCase().includes(q))).slice(0,8);
  closeD();if(!chars.length)return;
  const drop=document.createElement('div');drop.className='pdrop';drop.id='pDrop';
  drop.innerHTML=chars.map((c,i)=>{const av=c.image?`<div class="pav"><img src="${c.image}" alt=""></div>`:`<div class="pav">${AC.Chars.initials(c.id)}</div>`;return`<div class="pdi" data-i="${i}" data-cid="${c.id}" onclick="addPerso('${c.id}')">${av}<span class="pname">${AC.esc(AC.Chars.name(c.id))}</span><span class="prole">${AC.esc(c.role||'')}</span></div>`;}).join('');
  pdIdx=-1;inp.closest('.perso-sw').appendChild(drop);
}
function closeD(){document.getElementById('pDrop')?.remove();}
function closeDOut(e){if(!e.target.closest('.perso-sw')){closeD();document.removeEventListener('click',closeDOut);}}
function pdKey(e){const drop=document.getElementById('pDrop');if(!drop)return;const items=drop.querySelectorAll('.pdi');if(e.key==='ArrowDown'){e.preventDefault();pdIdx=Math.min(pdIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===pdIdx));}else if(e.key==='ArrowUp'){e.preventDefault();pdIdx=Math.max(pdIdx-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===pdIdx));}else if(e.key==='Enter'&&pdIdx>=0){e.preventDefault();const s=items[pdIdx];if(s)addPerso(s.dataset.cid);}else if(e.key==='Escape')closeD();}

async function addPerso(cid) {
  const s=AC.Scenes.get(sceneId);if(!s)return;
  s.personnageIds=[...new Set([...(s.personnageIds||[]),cid])];
  await AC.Scenes.save(s);closeD();
  const inp=document.getElementById('pInp');if(inp)inp.value='';
  const el=document.getElementById('ptags');if(el)el.innerHTML=buildPTags(s.personnageIds);
  renderSB();
}
async function remPerso(cid) {
  const s=AC.Scenes.get(sceneId);if(!s)return;
  s.personnageIds=(s.personnageIds||[]).filter(id=>id!==cid);
  await AC.Scenes.save(s);
  const el=document.getElementById('ptags');if(el)el.innerHTML=buildPTags(s.personnageIds);
  renderSB();
}

// ── CHAP MODAL ────────────────────────────────
async function showChapModal(editId) {
  const ch=editId?AC.Chapitres.get(editId):await AC.Chapitres.defaultNew();
  const m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal"><h3>${editId?'Modifier':'Nouveau chapitre'}</h3>
    <div class="mfi"><label>Numéro</label><input type="number" id="mN" value="${ch?.numero||1}" min="1"></div>
    <div class="mfi"><label>Titre</label><input type="text" id="mT" value="${AC.esc(ch?.titre||'')}" placeholder="Titre…"></div>
    <div class="mfi"><label>Acte / Arc</label><input type="text" id="mA" value="${AC.esc(ch?.acte||'')}" placeholder="Acte I…"></div>
    <div class="mfi"><label>Date fictive</label><input type="text" id="mD" value="${AC.esc(ch?.dateFiction||'')}" placeholder="Jour 1…"></div>
    <div class="mfi"><label>Description</label><textarea id="mDesc" placeholder="Résumé…">${AC.esc(ch?.description||'')}</textarea></div>
    <div class="modal-actions">
      ${editId?`<button class="btn btn-outline" style="color:var(--red);border-color:var(--red)" onclick="delChap('${editId}',this)">Supprimer</button>`:''}
      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Annuler</button>
      <button class="btn btn-dark" onclick="saveChap('${ch?.id||''}',this)">Enregistrer</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

async function saveChap(id,btn) {
  const m=btn.closest('.modal-overlay');
  const data={id:id||undefined,numero:+document.getElementById('mN').value,titre:document.getElementById('mT').value,acte:document.getElementById('mA').value,dateFiction:document.getElementById('mD').value,description:document.getElementById('mDesc').value,createdAt:Date.now()};
  const saved=await AC.Chapitres.save(data);
  m.remove();if(!chapId)chapId=saved.id;
  await renderSB();AC.toast('Chapitre enregistré ✓');
}

function delChap(id,btn) {
  btn.closest('.modal-overlay').remove();
  AC.modal('Supprimer ce chapitre ?','Les scènes ne seront pas supprimées.',async()=>{
    await AC.Chapitres.delete(id);if(chapId===id){chapId=null;sceneId=null;}
    await renderSB();welc();
  });
}

// ── INIT ──────────────────────────────────────
async function init() {
  await AC.loadAll();
  window._chars=await AC.Chars.all();
  // Refresh chars cache when search input focused
  document.addEventListener('focusin', async (e) => {
    if (e.target.id === 'pInp') { window._chars = await AC.Chars.all(); }
  });
  await renderSB();
  const first=(await AC.Chapitres.list())[0];
  if(first){chapId=first.id;await renderSB();}
}
init();
</script>
