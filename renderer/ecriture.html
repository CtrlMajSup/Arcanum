<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Écriture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
html,body{height:100%;overflow:hidden}body{display:flex;flex-direction:column}
.ws{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--ln);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:var(--sp-4);border-bottom:1px solid var(--ln);display:flex;flex-direction:column;gap:var(--sp-3)}
.sb-title{font-size:var(--text-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.chap-list{flex:1;overflow-y:auto;padding:var(--sp-2)}
.chap-group{margin-bottom:var(--sp-3)}
.chap-lbl{font-size:var(--text-xs);font-weight:500;color:var(--ink2);padding:var(--sp-2) var(--sp-3);display:flex;align-items:center;gap:var(--sp-2)}
.chap-num-badge{font-family:var(--mono);font-size:var(--text-xs);color:var(--ink3);background:var(--sf2);padding:1px 6px;border-radius:4px}
.scene-item{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) var(--sp-4);border-radius:var(--r);cursor:pointer;transition:background .1s;border:1px solid transparent;margin-bottom:2px}
.scene-item:hover{background:var(--sf2)}.scene-item.active{background:var(--sf2);border-color:var(--ln2)}
.si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.si-title{font-size:var(--text-xs);color:var(--ink2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-written{width:6px;height:6px;border-radius:50%;background:var(--grn,#27624a);flex-shrink:0}
.sb-foot{padding:var(--sp-3);border-top:1px solid var(--ln)}
.empty-sb{text-align:center;color:var(--ink3);font-size:var(--text-xs);padding:var(--sp-8) var(--sp-4);line-height:2}

/* EDITOR AREA */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.editor-topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;padding:0 var(--sp-5);border-bottom:1px solid var(--ln);background:var(--sf);gap:var(--sp-4)}
.scene-title-lbl{font-size:var(--text-sm);font-weight:500;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scene-meta-lbl{font-size:var(--text-xs);color:var(--ink3);white-space:nowrap;flex-shrink:0}
.view-tog{display:flex;border:1px solid var(--ln);border-radius:7px;overflow:hidden;flex-shrink:0}
.vt{padding:5px 10px;font-size:var(--text-xs);font-family:var(--sans);border:none;background:transparent;color:var(--ink2);cursor:pointer;transition:all .12s;border-right:1px solid var(--ln)}
.vt:last-child{border-right:none}.vt:hover{background:var(--sf2)}.vt.active{background:var(--ink);color:var(--bg)}
.word-count{font-size:var(--text-xs);color:var(--ink3);font-family:var(--mono);flex-shrink:0}
.save-indicator{font-size:var(--text-xs);color:var(--ink3);flex-shrink:0}

/* SPLIT LAYOUT */
.editor-split{flex:1;display:flex;overflow:hidden}
.editor-pane{flex:1;overflow-y:auto;padding:clamp(24px,4vw,56px) clamp(20px,5vw,80px);min-width:0}
.pane-divider{width:1px;background:var(--ln);flex-shrink:0}
.preview-pane{flex:1;overflow-y:auto;padding:clamp(24px,4vw,56px) clamp(20px,5vw,80px);min-width:0}

/* EDITOR */
#editor{width:100%;min-height:calc(100vh - 200px);font-family:var(--mono);font-size:clamp(13px,1.1vw,15px);line-height:1.9;color:var(--ink);border:none;outline:none;resize:none;background:transparent;white-space:pre-wrap;word-wrap:break-word;}
#editor::placeholder{color:var(--ink3)}

/* PREVIEW — typographie roman */
.preview-body{font-family:'DM Serif Display',serif;font-size:clamp(15px,1.3vw,18px);line-height:1.9;color:var(--ink)}
.preview-body p{margin-bottom:1.2em;text-indent:1.5em}
.preview-body p:first-child{text-indent:0}
.preview-body h1,.preview-body h2,.preview-body h3{font-family:var(--sans);font-weight:500;margin:1.8em 0 .6em;color:var(--ink)}
.preview-body h1{font-size:clamp(18px,1.8vw,24px)}
.preview-body h2{font-size:clamp(15px,1.4vw,19px)}
.preview-body h3{font-size:clamp(13px,1.2vw,16px)}
.preview-body em{font-style:italic}
.preview-body strong{font-weight:500}
.preview-body blockquote{border-left:3px solid var(--ln2);padding-left:1.2em;color:var(--ink2);margin:1.2em 0;font-style:italic}
.preview-body hr{border:none;border-top:1px solid var(--ln);margin:2em 0}
/* [[mention]] style */
.wiki-mention{background:rgba(37,99,171,.08);color:var(--blu,#2563ab);border-radius:4px;padding:0 3px;cursor:pointer;border-bottom:1px solid rgba(37,99,171,.2);font-family:var(--sans);font-size:.9em;font-style:normal}
.wiki-mention:hover{background:rgba(37,99,171,.15)}
/* [[mention]] in editor highlight */
.mention-hl{color:var(--blu,#2563ab)}

/* ENCYCLOPÉDIE PANEL */
.encyclo-panel{width:clamp(240px,24vw,320px);flex-shrink:0;border-left:1px solid var(--ln);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.ep-head{padding:var(--sp-4);border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:var(--sp-3)}
.ep-title{font-size:var(--text-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:500;flex:1}
.ep-close{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--ink3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:color .1s}
.ep-close:hover{color:var(--ink)}
.ep-search-wrap{padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--ln);position:relative}
.ep-search{width:100%;font-family:var(--sans);font-size:var(--text-sm);color:var(--ink);background:var(--sf2);border:1px solid var(--ln);border-radius:var(--r);padding:var(--sp-2) var(--sp-3);outline:none;transition:border-color .15s}
.ep-search:focus{border-color:var(--ink)}.ep-search::placeholder{color:var(--ink3)}
.ep-results{flex:1;overflow-y:auto;padding:var(--sp-2)}
.ep-item{padding:var(--sp-3) var(--sp-4);border-radius:var(--r);cursor:pointer;transition:background .1s;border-bottom:1px solid var(--ln)}
.ep-item:last-child{border-bottom:none}
.ep-item:hover{background:var(--sf2)}
.ep-item-name{font-size:var(--text-sm);font-weight:500;color:var(--ink);margin-bottom:2px}
.ep-item-type{font-size:var(--text-xs);color:var(--ink3)}
.ep-item-desc{font-size:var(--text-xs);color:var(--ink2);line-height:1.5;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Detail view */
.ep-detail{flex:1;overflow-y:auto;padding:var(--sp-5)}
.ep-detail-name{font-size:var(--text-md);font-weight:500;color:var(--ink);margin-bottom:3px}
.ep-detail-type{font-size:var(--text-xs);color:var(--ink3);margin-bottom:var(--sp-4)}
.ep-detail-section{margin-bottom:var(--sp-4)}
.ep-detail-lbl{font-size:var(--text-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:500;margin-bottom:var(--sp-2)}
.ep-detail-val{font-size:var(--text-sm);color:var(--ink2);line-height:1.7}
.ep-back{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--text-xs);color:var(--ink3);cursor:pointer;margin-bottom:var(--sp-4);transition:color .1s}
.ep-back:hover{color:var(--ink)}.ep-back svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.ep-insert-btn{width:100%;padding:var(--sp-3);border:1px dashed var(--ln2);border-radius:var(--r);background:transparent;font-family:var(--sans);font-size:var(--text-xs);color:var(--ink2);cursor:pointer;transition:all .12s;margin-top:var(--sp-4)}
.ep-insert-btn:hover{border-color:var(--ink);color:var(--ink)}

/* MENTION DROPDOWN */
.mention-drop{position:fixed;background:var(--sf);border:1px solid var(--ln2);border-radius:var(--rl);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:500;min-width:220px;max-height:240px;overflow-y:auto}
.md-item{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);cursor:pointer;transition:background .1s;font-size:var(--text-sm)}
.md-item:hover,.md-item.sel{background:var(--sf2)}.md-item-name{color:var(--ink)}.md-item-type{font-size:var(--text-xs);color:var(--ink3);margin-left:auto}

/* WELCOME */
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:var(--sp-4);text-align:center;padding:var(--sp-8)}
.welc h2{font-size:var(--text-lg);font-weight:300;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase}
.welc p{font-size:var(--text-sm);color:var(--ink3);line-height:1.9}

/* EXPORT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,25,23,.4);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--sf);border-radius:var(--rl);padding:var(--sp-8);max-width:520px;width:92%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:var(--text-md);font-weight:500;margin-bottom:var(--sp-5)}
.modal textarea{width:100%;min-height:300px;font-family:var(--mono);font-size:var(--text-sm);line-height:1.7;border:1px solid var(--ln);border-radius:var(--r);padding:var(--sp-4);outline:none;resize:vertical;color:var(--ink);background:var(--sf2)}
.modal-actions{display:flex;justify-content:flex-end;gap:var(--sp-3);margin-top:var(--sp-5)}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil</a>
  <span class="page-title">Écriture</span>
  <div class="topbar-r">
    <button class="btn btn-outline" style="font-size:var(--text-xs)" onclick="toggleEncyclo()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Encyclopédie
    </button>
    <button class="btn btn-outline" style="font-size:var(--text-xs)" onclick="exportTexte()">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter
    </button>
  </div>
</div>
<div class="ws">
  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-title">Scènes à écrire</div>
    </div>
    <div class="chap-list" id="chapList"><div class="empty-sb">Chargement…</div></div>
    <div class="sb-foot" style="font-size:var(--text-xs);color:var(--ink3)">
      <span id="writtenCount"></span>
    </div>
  </aside>

  <!-- EDITOR -->
  <div class="editor-area" id="editorArea">
    <div class="welc"><h2>Écriture</h2><p>Sélectionnez une scène à gauche pour commencer.<br>Tapez <strong>[[nom]]</strong> pour insérer une référence encyclopédique.</p></div>
  </div>

  <!-- ENCYCLOPÉDIE PANEL (hidden by default) -->
  <div class="encyclo-panel" id="encycloPanel" style="display:none"></div>
</div>

<script src="arcanum-client.js"></script>
<script>
let currentSceneId = null;
let currentTexteId = null;
let currentTexte   = '';
let viewMode       = 'split'; // 'edit' | 'split' | 'preview'
let encycloOpen    = false;
let saveTimer      = null;
let writtenScenes  = {};      // sceneId -> texteId
let mentionDropOpen = false;
let mentionStart   = -1;
let mdIdx          = -1;

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
async function renderSidebar() {
  const chaps  = await AC.Chapitres.list();
  const scenes = Object.values(await AC.Scenes.all());
  const el     = document.getElementById('chapList');
  if (!chaps.length) {
    el.innerHTML = '<div class="empty-sb">Aucun chapitre.<br>Créez des chapitres et des scènes d\'abord.</div>';
    return;
  }
  let total = 0, written = 0;
  let html = '';
  chaps.forEach(ch => {
    const chScenes = scenes.filter(s => s.chapitreId === ch.id).sort((a,b)=>(a.ordre||0)-(b.ordre||0));
    if (!chScenes.length) return;
    html += `<div class="chap-group">
      <div class="chap-lbl"><span class="chap-num-badge">Ch.${ch.numero}</span>${esc(ch.titre||'Sans titre')}</div>`;
    chScenes.forEach(s => {
      total++;
      const hasText = !!writtenScenes[s.id];
      if (hasText) written++;
      const lieu = s.lieuId ? AC.Lieux.get(s.lieuId) : null;
      const col  = lieu ? AC.Lieux.color(s.lieuId) : '#d0cfc9';
      html += `<div class="scene-item${s.id===currentSceneId?' active':''}" onclick="selectScene('${s.id}')">
        <div class="si-dot" style="background:${col}"></div>
        <span class="si-title">${esc(s.titre||'Scène sans titre')}</span>
        ${hasText ? '<div class="si-written" title="Texte rédigé"></div>' : ''}
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html || '<div class="empty-sb">Aucune scène.</div>';
  document.getElementById('writtenCount').textContent =
    written + '/' + total + ' scène' + (total>1?'s':'') + ' rédigée' + (written>1?'s':'');
}

// ═══════════════════════════════════════════════
// SELECT SCENE
// ═══════════════════════════════════════════════
async function selectScene(sceneId) {
  if (currentSceneId && currentSceneId !== sceneId) await autoSave();
  currentSceneId = sceneId;
  const scene  = AC.Scenes.get(sceneId);
  const chap   = scene?.chapitreId ? AC.Chapitres.get(scene.chapitreId) : null;
  const lieu   = scene?.lieuId ? AC.Lieux.get(scene.lieuId) : null;
  const texte  = await window.arcanum.textes.byScene(sceneId);
  currentTexteId = texte?.id || null;
  currentTexte   = texte?.contenu || '';
  const metaParts = [
    chap ? 'Ch.' + chap.numero + (chap.titre ? ' — '+chap.titre : '') : null,
    lieu ? lieu.nom : null,
    scene?.dateFiction || null,
  ].filter(Boolean);
  renderEditor(scene, metaParts.join(' · '));
  renderSidebar();
  if (encycloOpen) renderEncycloSearch('');
}

// ═══════════════════════════════════════════════
// RENDER EDITOR
// ═══════════════════════════════════════════════
function renderEditor(scene, metaLabel) {
  document.getElementById('editorArea').innerHTML = `
  <div class="editor-topbar">
    <span class="scene-title-lbl">${esc(scene?.titre||'Scène sans titre')}</span>
    <span class="scene-meta-lbl">${esc(metaLabel||'')}</span>
    <div class="view-tog">
      <button class="vt${viewMode==='edit'?' active':''}" onclick="setView('edit')">Écrire</button>
      <button class="vt${viewMode==='split'?' active':''}" onclick="setView('split')">Split</button>
      <button class="vt${viewMode==='preview'?' active':''}" onclick="setView('preview')">Aperçu</button>
    </div>
    <span class="word-count" id="wordCount">${wordCount(currentTexte)} mots</span>
    <span class="save-indicator" id="saveInd">—</span>
  </div>
  <div class="editor-split" id="editorSplit">
    ${viewMode !== 'preview' ? `<div class="editor-pane" id="editorPane">
      <textarea id="editor" placeholder="Commencez à écrire…&#10;&#10;Tapez [[nom]] pour référencer un personnage ou un lieu."
        oninput="onEditorInput(this)" onkeydown="onEditorKey(event)"
        spellcheck="true">${escRaw(currentTexte)}</textarea>
    </div>` : ''}
    ${viewMode !== 'edit' ? `${viewMode==='split'?'<div class="pane-divider"></div>':''}
    <div class="preview-pane"><div class="preview-body" id="previewBody">${renderMarkdown(currentTexte)}</div></div>` : ''}
  </div>`;
  if (viewMode !== 'preview') {
    const ed = document.getElementById('editor');
    if (ed) { ed.focus(); setCursorEnd(ed); }
  }
}

function setView(v) {
  viewMode = v;
  const scene = currentSceneId ? AC.Scenes.get(currentSceneId) : null;
  const chap  = scene?.chapitreId ? AC.Chapitres.get(scene.chapitreId) : null;
  const lieu  = scene?.lieuId ? AC.Lieux.get(scene.lieuId) : null;
  const metaParts = [chap?'Ch.'+chap.numero+(chap.titre?' — '+chap.titre:''):null, lieu?.nom, scene?.dateFiction].filter(Boolean);
  renderEditor(scene, metaParts.join(' · '));
}

function setCursorEnd(el) {
  el.selectionStart = el.selectionEnd = el.value.length;
}

// ═══════════════════════════════════════════════
// EDITOR INPUT
// ═══════════════════════════════════════════════
function onEditorInput(ta) {
  currentTexte = ta.value;
  // Update word count
  const wc = document.getElementById('wordCount');
  if (wc) wc.textContent = wordCount(currentTexte) + ' mots';
  // Live preview
  if (viewMode === 'split') {
    const pb = document.getElementById('previewBody');
    if (pb) pb.innerHTML = renderMarkdown(currentTexte);
  }
  // Check for [[ trigger
  const pos = ta.selectionStart;
  const before = ta.value.slice(0, pos);
  const m = before.match(/\[\[([^\][\n]*)$/);
  if (m) {
    mentionStart = pos - m[0].length;
    showMentionDrop(m[1], ta);
  } else {
    closeMentionDrop();
  }
  // Autosave debounce
  const ind = document.getElementById('saveInd');
  if (ind) ind.textContent = 'Non sauvegardé';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 1200);
}

function onEditorKey(e) {
  const drop = document.getElementById('mentionDrop');
  if (drop) {
    const items = drop.querySelectorAll('.md-item');
    if (e.key === 'ArrowDown')  { e.preventDefault(); mdIdx = Math.min(mdIdx+1, items.length-1); items.forEach((el,i)=>el.classList.toggle('sel',i===mdIdx)); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); mdIdx = Math.max(mdIdx-1, 0); items.forEach((el,i)=>el.classList.toggle('sel',i===mdIdx)); return; }
    if (e.key === 'Enter' && mdIdx >= 0) { e.preventDefault(); const s = items[mdIdx]; if (s) insertMention(s.dataset.name, document.getElementById('editor')); return; }
    if (e.key === 'Escape')     { closeMentionDrop(); return; }
  }
  // Tab → 2 spaces
  if (e.key === 'Tab') { e.preventDefault(); insertAtCursor(document.getElementById('editor'), '  '); }
}

// ═══════════════════════════════════════════════
// [[MENTION]] SYSTEM
// ═══════════════════════════════════════════════
function showMentionDrop(query, ta) {
  closeMentionDrop();
  const q = query.toLowerCase().trim();
  const allChars  = AC.Chars._getAll() || {};
  const allLieux  = AC.Lieux._lieux_raw() || {};
  const chars = Object.values(allChars).filter(c => !q || [c.prenom,c.nom,c.surnom].join(' ').toLowerCase().includes(q)).slice(0,5);
  const lieux = Object.values(allLieux).filter(l => !q || (l.nom||'').toLowerCase().includes(q)).slice(0,5);
  const items = [
    ...chars.map(c => ({ name: [c.prenom,c.nom].filter(Boolean).join(' '), type: 'Personnage', id: c.id, icon: '👤' })),
    ...lieux.map(l => ({ name: l.nom||'?', type: {planete:'Planète',ville:'Ville',vaisseau:'Vaisseau'}[l.type]||l.type, id: l.id, icon: '🌍' })),
  ].filter(x => x.name);
  if (!items.length) return;
  const rect = ta.getBoundingClientRect();
  // Approximate caret position
  const lines = ta.value.slice(0, ta.selectionStart).split('\n');
  const lineNum = lines.length;
  const lineH = parseFloat(getComputedStyle(ta).lineHeight) || 24;
  const padTop = parseFloat(getComputedStyle(ta).paddingTop) || 0;
  const top = rect.top + padTop + lineNum * lineH - ta.scrollTop;
  const left = rect.left + 40;
  const drop = document.createElement('div');
  drop.className = 'mention-drop'; drop.id = 'mentionDrop';
  drop.style.top = Math.min(top, window.innerHeight - 260) + 'px';
  drop.style.left = Math.min(left, window.innerWidth - 240) + 'px';
  mdIdx = -1;
  drop.innerHTML = items.map(it =>
    `<div class="md-item" data-name="${esc(it.name)}" data-id="${it.id}" onclick="insertMention('${esc(it.name)}',document.getElementById('editor'))">
      <span class="md-item-name">${esc(it.name)}</span>
      <span class="md-item-type">${it.type}</span>
    </div>`
  ).join('');
  document.body.appendChild(drop);
  setTimeout(() => document.addEventListener('click', closeMentionDropOut), 0);
}

function closeMentionDropOut(e) { if (!e.target.closest('.mention-drop')) { closeMentionDrop(); document.removeEventListener('click', closeMentionDropOut); } }
function closeMentionDrop() { document.getElementById('mentionDrop')?.remove(); mentionDropOpen = false; mdIdx = -1; }

function insertMention(name, ta) {
  if (!ta) return;
  const pos = ta.selectionStart;
  const before = ta.value.slice(0, pos);
  const m = before.match(/\[\[([^\][\n]*)$/);
  if (!m) return;
  const start = pos - m[0].length;
  const after = ta.value.slice(pos);
  ta.value = ta.value.slice(0, start) + '[[' + name + ']]' + after;
  const newPos = start + name.length + 4;
  ta.selectionStart = ta.selectionEnd = newPos;
  closeMentionDrop();
  currentTexte = ta.value;
  if (viewMode === 'split') { const pb = document.getElementById('previewBody'); if (pb) pb.innerHTML = renderMarkdown(currentTexte); }
  clearTimeout(saveTimer); saveTimer = setTimeout(autoSave, 1200);
}

function insertAtCursor(ta, text) {
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.slice(0,s) + text + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + text.length;
  currentTexte = ta.value;
}

// ═══════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════
function renderMarkdown(text) {
  if (!text) return '<p style="color:var(--ink3);font-style:italic">Aperçu vide — commencez à écrire.</p>';
  let html = esc(text)
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold / italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    // HR
    .replace(/^---$/gm, '<hr>')
    // Blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // [[mentions]] → clickable
    .replace(/\[\[(.+?)\]\]/g, (_, name) =>
      `<span class="wiki-mention" onclick="openEncycloFor('${esc(name)}')" title="Voir dans l'encyclopédie">[[${esc(name)}]]</span>`
    )
    // Paragraphs: double newline
    .replace(/\n\n+/g, '</p><p>')
    // Single newlines
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// ═══════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════
async function autoSave() {
  if (!currentSceneId) return;
  const texte = { id: currentTexteId||undefined, sceneId: currentSceneId, contenu: currentTexte };
  const saved = await window.arcanum.textes.save(texte);
  currentTexteId = saved.id;
  writtenScenes[currentSceneId] = saved.id;
  const ind = document.getElementById('saveInd');
  if (ind) { ind.textContent = 'Sauvegardé ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
}

// ═══════════════════════════════════════════════
// EXPORT — texte propre sans [[mentions]]
// ═══════════════════════════════════════════════
function exportTexte() {
  if (!currentSceneId) { AC.toast('Ouvrez une scène d\'abord.'); return; }
  const scene = AC.Scenes.get(currentSceneId);
  const clean = currentTexte.replace(/\[\[(.+?)\]\]/g, '$1'); // [[Nom]] → Nom
  const m = document.createElement('div'); m.className = 'modal-overlay';
  m.innerHTML = `<div class="modal">
    <h3>Export — ${esc(scene?.titre||'Scène')}</h3>
    <p style="font-size:var(--text-xs);color:var(--ink3);margin-bottom:var(--sp-3)">Texte propre, sans références encyclopédiques.</p>
    <textarea readonly onclick="this.select()">${escRaw(clean)}</textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Fermer</button>
      <button class="btn btn-dark" onclick="copyExport('${esc(clean).replace(/'/g,'\\&#39;')}',this)">Copier</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

function copyExport(text, btn) {
  navigator.clipboard.writeText(text.replace(/&#39;/g,"'")).then(()=>{ btn.textContent='Copié !'; setTimeout(()=>btn.textContent='Copier',1500); });
}

// ═══════════════════════════════════════════════
// ENCYCLOPÉDIE PANEL
// ═══════════════════════════════════════════════
function toggleEncyclo() {
  encycloOpen = !encycloOpen;
  const panel = document.getElementById('encycloPanel');
  panel.style.display = encycloOpen ? 'flex' : 'none';
  if (encycloOpen) renderEncycloSearch('');
}

function renderEncycloSearch(q) {
  const panel = document.getElementById('encycloPanel');
  const allChars = AC.Chars._getAll() || {};
  const allLieux = AC.Lieux._lieux_raw() || {};
  const ql = q.toLowerCase();
  const chars = Object.values(allChars).filter(c => !ql || [c.prenom,c.nom,c.surnom,c.role].join(' ').toLowerCase().includes(ql)).slice(0,8);
  const lieux = Object.values(allLieux).filter(l => !ql || (l.nom||'').toLowerCase().includes(ql)||(l.description||'').toLowerCase().includes(ql)).slice(0,6);
  const items = [
    ...chars.map(c => ({ id:c.id, name:[c.prenom,c.nom].filter(Boolean).join(' ')||'Sans nom', type:'Personnage', desc:c.role||c.notes||'', entity:'char' })),
    ...lieux.map(l => ({ id:l.id, name:l.nom||'?', type:{planete:'Planète',ville:'Ville',vaisseau:'Vaisseau'}[l.type]||l.type, desc:l.description||'', entity:'lieu' })),
  ];
  panel.innerHTML = `
    <div class="ep-head">
      <span class="ep-title">Encyclopédie</span>
      <button class="ep-close" onclick="toggleEncyclo()">×</button>
    </div>
    <div class="ep-search-wrap">
      <input class="ep-search" id="epSearch" placeholder="Chercher un personnage ou lieu…" value="${esc(q)}"
        oninput="renderEncycloSearch(this.value)" autocomplete="off">
    </div>
    <div class="ep-results">
      ${items.length ? items.map(it => `
        <div class="ep-item" onclick="openEncycloDetail('${it.entity}','${it.id}')">
          <div class="ep-item-name">${esc(it.name)}</div>
          <div class="ep-item-type">${it.type}</div>
          ${it.desc?`<div class="ep-item-desc">${esc(it.desc.slice(0,80)+(it.desc.length>80?'…':''))}</div>`:''}
        </div>`).join('')
      : `<div style="padding:var(--sp-8);text-align:center;font-size:var(--text-xs);color:var(--ink3)">Aucun résultat.</div>`}
    </div>`;
}

function openEncycloDetail(entity, id) {
  const panel = document.getElementById('encycloPanel');
  let name='', type='', sections=[];
  if (entity === 'char') {
    const c = AC.Chars.get(id); if (!c) return;
    name = [c.prenom,c.nom].filter(Boolean).join(' ')||'Sans nom';
    type = 'Personnage' + (c.role?' · '+c.role:'');
    if (c.notes) sections.push({ lbl:'Résumé', val:c.notes });
    if (c.lieuNaissance||c.lieuVie) sections.push({ lbl:'Lieux', val:[c.lieuNaissance?'Naissance : '+c.lieuNaissance:'', c.lieuVie?'Vie : '+c.lieuVie:''].filter(Boolean).join(' · ') });
    if (c.passe) sections.push({ lbl:'Passé', val:c.passe.slice(0,200)+(c.passe.length>200?'…':'') });
    if (c.valeurs) sections.push({ lbl:'Valeurs', val:c.valeurs });
    if (c.aime||c.deteste) sections.push({ lbl:'Goûts', val:[c.aime?'Aime : '+c.aime:'',c.deteste?'Déteste : '+c.deteste:''].filter(Boolean).join(' · ') });
  } else {
    const l = AC.Lieux.get(id); if (!l) return;
    name = l.nom||'?';
    type = {planete:'Planète',ville:'Ville',vaisseau:'Vaisseau'}[l.type]||l.type;
    if (l.description) sections.push({ lbl:'Description', val:l.description });
    if (l.tags?.length) sections.push({ lbl:'Tags', val:l.tags.join(', ') });
    const parent = l.parentId ? AC.Lieux.get(l.parentId) : null;
    if (parent) sections.push({ lbl:'Système', val:parent.nom });
  }
  panel.innerHTML = `
    <div class="ep-head">
      <span class="ep-title">Encyclopédie</span>
      <button class="ep-close" onclick="toggleEncyclo()">×</button>
    </div>
    <div class="ep-detail">
      <div class="ep-back" onclick="renderEncycloSearch(document.getElementById('epSearch')?.value||'')">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Retour
      </div>
      <div class="ep-detail-name">${esc(name)}</div>
      <div class="ep-detail-type">${esc(type)}</div>
      ${sections.map(s=>`<div class="ep-detail-section"><div class="ep-detail-lbl">${esc(s.lbl)}</div><div class="ep-detail-val">${esc(s.val)}</div></div>`).join('')}
      <button class="ep-insert-btn" onclick="insertMention('${esc(name)}',document.getElementById('editor'))">
        Insérer [[${esc(name)}]] dans le texte
      </button>
    </div>`;
}

function openEncycloFor(name) {
  // called from [[mention]] click in preview
  if (!encycloOpen) { encycloOpen = true; document.getElementById('encycloPanel').style.display = 'flex'; }
  const allChars = AC.Chars._getAll() || {};
  const allLieux = AC.Lieux._lieux_raw() || {};
  const char = Object.values(allChars).find(c => [c.prenom,c.nom].filter(Boolean).join(' ').toLowerCase() === name.toLowerCase());
  const lieu = Object.values(allLieux).find(l => (l.nom||'').toLowerCase() === name.toLowerCase());
  if (char) openEncycloDetail('char', char.id);
  else if (lieu) openEncycloDetail('lieu', lieu.id);
  else renderEncycloSearch(name);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRaw(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function wordCount(text) { return text.trim() ? text.trim().split(/\s+/).length : 0; }

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init() {
  await AC.loadAll();
  // Load written scenes index
  const chaps  = await AC.Chapitres.list();
  const scenes = Object.values(await AC.Scenes.all());
  for (const s of scenes) {
    const t = await window.arcanum.textes.byScene(s.id);
    if (t && t.contenu) writtenScenes[s.id] = t.id;
  }
  await renderSidebar();
}
init();
</script>
