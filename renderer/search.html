<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum — Recherche</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arcanum.css">
<style>
html,body{height:100%;overflow:hidden}body{display:flex;flex-direction:column}
.search-hero{padding:var(--sp-6) var(--sp-6) 0;flex-shrink:0}
.sb-wrap{position:relative;max-width:680px;margin:0 auto}
.sb-wrap svg{position:absolute;left:var(--sp-4);top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:1.8;pointer-events:none}
#gSearch{width:100%;padding:var(--sp-4) var(--sp-5) var(--sp-4) calc(var(--sp-4) + 22px);font-family:var(--sans);font-size:var(--text-md);color:var(--ink);background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);outline:none;transition:border-color .15s,box-shadow .15s}
#gSearch:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,25,23,.05)}
#gSearch::placeholder{color:var(--ink3)}
.smeta{max-width:680px;margin:var(--sp-3) auto 0;display:flex;align-items:center;justify-content:space-between}
.scnt{font-size:var(--text-xs);color:var(--ink3)}
.chip-row{display:flex;gap:var(--sp-2)}
.results-wrap{flex:1;overflow-y:auto;padding:var(--sp-5) var(--sp-6) var(--sp-10)}
.ri{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:var(--sp-6)}
.rg-head{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-3)}
.rg-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rg-icon svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2}
.rg-lbl{font-size:var(--text-xs);font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.rg-cnt{font-size:var(--text-xs);font-family:var(--mono);color:var(--ink3)}
.rc{display:flex;align-items:flex-start;gap:var(--sp-4);padding:var(--sp-4) var(--sp-5);background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);cursor:pointer;text-decoration:none;color:inherit;transition:border-color .12s,box-shadow .12s;margin-bottom:var(--sp-2)}
.rc:hover{border-color:var(--ln2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.rc-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:500;color:var(--ink3);overflow:hidden;background:var(--sf3)}
.rc-av img{width:100%;height:100%;object-fit:cover}.rc-av.sq{border-radius:var(--r)}
.rc-body{flex:1;min-width:0}
.rc-title{font-size:var(--text-sm);font-weight:500;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap}
.rc-badge{font-size:var(--text-xs);padding:1px 7px;border-radius:99px;background:var(--sf3);color:var(--ink3);border:1px solid var(--ln);font-weight:400}
.rc-sub{font-size:var(--text-xs);color:var(--ink3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-exc{font-size:var(--text-xs);color:var(--ink2);line-height:1.6}
mark{background:#fff3b0;color:var(--ink);border-radius:2px;padding:0 1px;font-style:normal}
.sempty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp-10) var(--sp-6);gap:var(--sp-4);text-align:center}
.sempty svg{width:36px;height:36px;stroke:var(--ln2);fill:none;stroke-width:1.2}
.sempty h3{font-size:var(--text-md);font-weight:400;color:var(--ink2)}.sempty p{font-size:var(--text-sm);color:var(--ink3);line-height:1.9}
.welc-s{display:flex;flex-direction:column;align-items:center;padding:var(--sp-10) var(--sp-6);gap:var(--sp-5)}
.welc-s h2{font-size:var(--text-lg);font-weight:300;color:var(--ink2);letter-spacing:.08em}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,160px),1fr));gap:var(--sp-3);max-width:680px;width:100%}
.sc-card{padding:var(--sp-4) var(--sp-5);background:var(--sf);border:1px solid var(--ln);border-radius:var(--rl);cursor:pointer;text-decoration:none;color:inherit;display:flex;align-items:center;gap:var(--sp-4);transition:border-color .12s}
.sc-card:hover{border-color:var(--ln2)}
.sc-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:1.8}
.sc-lbl{font-size:var(--text-sm);font-weight:500;color:var(--ink)}.sc-cnt{font-size:var(--text-xs);color:var(--ink3);display:block;margin-top:1px}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Accueil</a>
  <span class="page-title">Recherche</span>
</div>
<div class="search-hero">
  <div class="sb-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="gSearch" type="search" placeholder="Chercher dans personnages, lieux, scènes, chapitres…" autocomplete="off" autofocus oninput="onSearch()">
  </div>
  <div class="smeta">
    <span class="scnt" id="scnt"></span>
    <div class="chip-row">
      <button class="chip active" data-t="all" onclick="setT('all',this)">Tout</button>
      <button class="chip" data-t="perso" onclick="setT('perso',this)">Persos</button>
      <button class="chip" data-t="lieu" onclick="setT('lieu',this)">Lieux</button>
      <button class="chip" data-t="scene" onclick="setT('scene',this)">Scènes</button>
      <button class="chip" data-t="chap" onclick="setT('chap',this)">Chapitres</button>
    </div>
  </div>
</div>
<div class="results-wrap" id="rWrap"><div class="ri" id="rInner"></div></div>
<script src="arcanum-client.js"></script>
<script>
let activeT='all', sTimer=null;

function setT(t,el){activeT=t;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');onSearch();}
function onSearch(){clearTimeout(sTimer);sTimer=setTimeout(doSearch,80);}

async function doSearch(){
  const q=document.getElementById('gSearch').value.trim();
  if(!q){showWelc();return;}
  await AC.loadAll();
  const words=q.toLowerCase().split(/\s+/).filter(Boolean);
  const results={perso:[],lieu:[],scene:[],chap:[]};

  if(activeT==='all'||activeT==='perso'){
    const chars=await AC.Chars.all();
    Object.values(chars).forEach(c=>{
      const f=[c.prenom,c.nom,c.surnom,c.role,c.lieuNaissance,c.lieuVie,c.notes,c.passe,c.valeurs,c.aime,c.deteste,c.emploi,...(c.relations||[]).map(r=>r.charName+' '+r.type+' '+(r.note||''))].filter(Boolean).join(' ');
      const sc=score(f,words);if(sc>0)results.perso.push({id:c.id,sc,data:c,exc:excerpt(f,words)});
    });
    results.perso.sort((a,b)=>b.sc-a.sc);
  }
  if(activeT==='all'||activeT==='lieu'){
    const lieux=await AC.Lieux.all();
    Object.values(lieux).forEach(l=>{
      const f=[l.nom,l.type,l.description,...(l.tags||[])].filter(Boolean).join(' ');
      const sc=score(f,words);if(sc>0)results.lieu.push({id:l.id,sc,data:l,exc:excerpt(f,words)});
    });
    results.lieu.sort((a,b)=>b.sc-a.sc);
  }
  if(activeT==='all'||activeT==='scene'){
    const scenes=await AC.Scenes.all();const chaps=await AC.Chapitres.all();const lieux=await AC.Lieux.all();const chars=await AC.Chars.all();
    Object.values(scenes).forEach(s=>{
      const chap=chaps[s.chapitreId],lieu=lieux[s.lieuId];
      const pnames=(s.personnageIds||[]).map(id=>{const c=chars[id];return c?[c.prenom,c.nom].filter(Boolean).join(' '):'';}).join(' ');
      const f=[s.titre,s.note,s.dateFiction,chap?.titre,lieu?.nom,pnames].filter(Boolean).join(' ');
      const sc=score(f,words);if(sc>0)results.scene.push({id:s.id,sc,data:s,exc:excerpt(f,words),chap,lieu,pnames});
    });
    results.scene.sort((a,b)=>(a.chap?.numero||0)-(b.chap?.numero||0)||b.sc-a.sc);
  }
  if(activeT==='all'||activeT==='chap'){
    const chaps=await AC.Chapitres.all();
    Object.values(chaps).forEach(ch=>{
      const f=['chapitre '+ch.numero,ch.titre,ch.acte,ch.dateFiction,ch.description].filter(Boolean).join(' ');
      const sc=score(f,words);if(sc>0)results.chap.push({id:ch.id,sc,data:ch,exc:excerpt(f,words),scnt:AC.Scenes.byChap(ch.id).length});
    });
    results.chap.sort((a,b)=>(a.data.numero||0)-(b.data.numero||0));
  }

  render(results,words);
}

function score(text,words){const tl=text.toLowerCase();let s=0;for(const w of words){if(!tl.includes(w))return 0;s+=((tl.match(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length)*2;if(tl.slice(0,60).includes(w))s+=3;}return s;}
function excerpt(text,words,max=120){if(!text)return'';const tl=text.toLowerCase();let best=0;for(const w of words){const i=tl.indexOf(w);if(i>=0){best=i;break;}}const start=Math.max(0,best-30);return(start>0?'…':'')+text.slice(start,start+max)+(start+max<text.length?'…':'');}
function hl(text,words){let r=esc(text);words.forEach(w=>{r=r.replace(new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');});return r;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function render(results,words){
  const total=results.perso.length+results.lieu.length+results.scene.length+results.chap.length;
  document.getElementById('scnt').textContent=total?`${total} résultat${total>1?'s':''}` :'';
  if(!total){document.getElementById('rInner').innerHTML=`<div class="sempty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>Aucun résultat</h3><p>Essayez un autre mot-clé.</p></div>`;return;}
  let html='';
  if(results.perso.length){
    html+=`<div><div class="rg-head"><div class="rg-icon" style="background:#5B8DB8"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span class="rg-lbl">Personnages</span><span class="rg-cnt">${results.perso.length}</span></div>`;
    results.perso.slice(0,8).forEach(r=>{const c=r.data;const nm=[c.prenom,c.nom].filter(Boolean).join(' ')||'Sans nom';const av=c.image?`<div class="rc-av"><img src="${c.image}" alt=""></div>`:`<div class="rc-av">${((c.prenom?.[0]||'')+(c.nom?.[0]||'')).toUpperCase()||'?'}</div>`;html+=`<a class="rc" href="personnages.html">${av}<div class="rc-body"><div class="rc-title">${hl(nm,words)}${c.role?`<span class="rc-badge">${esc(c.role)}</span>`:''}</div><div class="rc-sub">${esc([c.lieuNaissance,c.lieuVie].filter(Boolean).join(' · ')||'—')}</div>${r.exc?`<div class="rc-exc">${hl(r.exc,words)}</div>`:''}</div></a>`;});
    html+='</div>';
  }
  if(results.lieu.length){
    html+=`<div><div class="rg-head"><div class="rg-icon" style="background:#7BAF7B"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div><span class="rg-lbl">Lieux</span><span class="rg-cnt">${results.lieu.length}</span></div>`;
    results.lieu.slice(0,6).forEach(r=>{const l=r.data;const col=AC.Lieux.color(l.id);const tl={planete:'Planète',ville:'Ville',vaisseau:'Vaisseau'}[l.type]||l.type;html+=`<a class="rc" href="lieux.html"><div class="rc-av sq" style="background:${col}20;border-color:${col}40"><div style="width:14px;height:14px;border-radius:3px;background:${col}"></div></div><div class="rc-body"><div class="rc-title">${hl(l.nom||'Sans nom',words)}<span class="rc-badge">${tl}</span></div><div class="rc-sub">${esc(AC.Lieux.fullName(l.id))}</div>${r.exc?`<div class="rc-exc">${hl(r.exc,words)}</div>`:''}</div></a>`;});
    html+='</div>';
  }
  if(results.scene.length){
    html+=`<div><div class="rg-head"><div class="rg-icon" style="background:#9B7BB5"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="rg-lbl">Scènes</span><span class="rg-cnt">${results.scene.length}</span></div>`;
    results.scene.slice(0,8).forEach(r=>{const s=r.data;const cl=r.chap?`Ch.${r.chap.numero}`:'—';const lc=s.lieuId?AC.Lieux.color(s.lieuId):'#b0afa9';html+=`<a class="rc" href="scenes.html"><div class="rc-av sq" style="background:${lc}15;border-color:${lc}30;font-family:var(--mono);font-size:var(--text-xs);color:${lc}">${esc(cl)}</div><div class="rc-body"><div class="rc-title">${hl(s.titre||'Scène sans titre',words)}</div><div class="rc-sub">${esc(r.lieu?.nom||'—')} · ${esc(r.pnames||'—')}${s.dateFiction?' · '+s.dateFiction:''}</div>${r.exc?`<div class="rc-exc">${hl(r.exc,words)}</div>`:''}</div></a>`;});
    html+='</div>';
  }
  if(results.chap.length){
    html+=`<div><div class="rg-head"><div class="rg-icon" style="background:#C4A35A"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><span class="rg-lbl">Chapitres</span><span class="rg-cnt">${results.chap.length}</span></div>`;
    results.chap.forEach(r=>{const ch=r.data;html+=`<a class="rc" href="scenes.html"><div class="rc-av sq" style="background:#C4A35A;font-family:var(--mono);font-size:var(--text-sm);color:#fff;border:none">${ch.numero}</div><div class="rc-body"><div class="rc-title">${hl(ch.titre||'Sans titre',words)}${ch.acte?`<span class="rc-badge">${esc(ch.acte)}</span>`:''}</div><div class="rc-sub">${ch.dateFiction?esc(ch.dateFiction)+' · ':''} ${r.scnt} scène${r.scnt!==1?'s':''}</div>${r.exc?`<div class="rc-exc">${hl(r.exc,words)}</div>`:''}</div></a>`;});
    html+='</div>';
  }
  document.getElementById('rInner').innerHTML=html;
}

async function showWelc(){
  document.getElementById('scnt').textContent='';
  const chars=Object.keys(await AC.Chars.all()).length;
  const lieux=Object.keys(await AC.Lieux.all()).length;
  const scenes=Object.keys(await AC.Scenes.all()).length;
  const chaps=Object.keys(await AC.Chapitres.all()).length;
  document.getElementById('rInner').innerHTML=`<div class="welc-s"><h2>Recherche globale</h2>
    <div class="sc-grid">
      <a class="sc-card" href="personnages.html"><div class="sc-icon" style="background:#5B8DB8"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="sc-lbl">Personnages</div><span class="sc-cnt">${chars} fiche${chars!==1?'s':''}</span></div></a>
      <a class="sc-card" href="lieux.html"><div class="sc-icon" style="background:#7BAF7B"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg></div><div><div class="sc-lbl">Lieux</div><span class="sc-cnt">${lieux} lieu${lieux!==1?'x':''}</span></div></a>
      <a class="sc-card" href="scenes.html"><div class="sc-icon" style="background:#9B7BB5"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div><div class="sc-lbl">Scènes</div><span class="sc-cnt">${scenes} scène${scenes!==1?'s':''}</span></div></a>
      <a class="sc-card" href="timeline.html"><div class="sc-icon" style="background:#C4A35A"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><polyline points="8 8 3 12 8 16"/></svg></div><div><div class="sc-lbl">Timeline</div><span class="sc-cnt">${chaps} chapitre${chaps!==1?'s':''}</span></div></a>
    </div>
    <p style="font-size:var(--text-xs);color:var(--ink3)">Cherchez un nom, un lieu, une date fictive, un mot dans une note…</p>
  </div>`;
}

document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement!==document.getElementById('gSearch')){e.preventDefault();document.getElementById('gSearch').focus();}});

async function init(){await AC.loadAll();showWelc();}
init();
</script>
</body>
</html>
